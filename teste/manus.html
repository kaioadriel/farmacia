<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>Controle de Farmácias</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    body { -webkit-tap-highlight-color: transparent; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .auth-bg { background: linear-gradient(135deg, #eff6ff 0%, #bfdbfe 100%); }

    .wrap-two-lines {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: normal !important;
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.2;
    }
    .wrap-soft {
      white-space: normal !important;
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.25;
    }
  
    :root { --app-radius: 22px; }
    .wrap-two-lines, .wrap-soft { line-height: 1.22; }
    #main-header, #mobile-nav, aside > div, .view-section .bg-white, #modal-content, #quick-add-content { transition: all .25s ease; }
    button { transition: transform .15s ease, box-shadow .2s ease, background .2s ease; }
    button:active { transform: scale(.97); }

    body#app-body { background: radial-gradient(circle at top left, #dbeafe 0, #f8fafc 32%, #eef2ff 100%) !important; color: #172033; }
    #main-header { margin: 10px 12px 0; width: calc(100% - 24px) !important; border-radius: 24px; border: 1px solid rgba(148,163,184,0.24) !important; box-shadow: 0 18px 45px rgba(15,23,42,0.08) !important; backdrop-filter: blur(12px); background: rgba(255,255,255,0.86) !important; }
    @media (min-width: 768px){ #main-header { left: 0; right: 0; } #main-content { padding-top: 20px !important; } }
    #main-content { max-width: 1180px !important; }
    aside > div { border-radius: 28px !important; border: 1px solid rgba(148,163,184,0.22) !important; box-shadow: 0 18px 40px rgba(15,23,42,0.07) !important; background: rgba(255,255,255,0.80) !important; backdrop-filter: blur(14px); }
    .nav-btn-desktop { border-radius: 18px !important; font-weight: 800; }
    .nav-btn-desktop.bg-blue-50 { background: linear-gradient(135deg,#2563eb,#60a5fa) !important; color: white !important; box-shadow: 0 12px 24px rgba(37,99,235,0.25); }
    .view-section > .flex:first-child { background: rgba(255,255,255,0.60); border: 1px solid rgba(148,163,184,0.18); border-radius: 30px; padding: 14px; box-shadow: 0 16px 35px rgba(15,23,42,0.06); }
    .view-section h2 { letter-spacing: -0.04em; }
    .view-section .bg-white, #compra-filters-panel { border-radius: 28px !important; border: 1px solid rgba(148,163,184,0.18) !important; box-shadow: 0 18px 38px rgba(15,23,42,0.07) !important; background: rgba(255,255,255,0.86) !important; backdrop-filter: blur(10px); }
    #erp-search, #auth-email, #auth-pass, select, input, textarea { border-radius: 18px !important; }
    #mobile-nav { left: 16px; right: 16px; bottom: 14px; width: calc(100% - 32px) !important; border-radius: 28px; border: 1px solid rgba(148,163,184,0.25) !important; box-shadow: 0 18px 45px rgba(15,23,42,0.18); overflow: hidden; }
    #modal-content { border-radius: 32px !important; }

    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes softPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0.28); } 50% { box-shadow: 0 0 0 8px rgba(37,99,235,0); } }
    .view-section:not(.hidden) { animation: fadeSlideUp 0.28s ease both; }
    #list-erp > div, #list-compras > div, #dashboard-recent-compras > div { animation: fadeSlideUp 0.22s ease both; }
    #list-erp > div:hover, #list-compras > div:hover, #dashboard-recent-compras > div:hover { transform: translateY(-2px); }
    .quick-action-card { background: rgba(255,255,255,0.78); border: 1px solid rgba(148,163,184,0.22); border-radius: 22px; box-shadow: 0 12px 30px rgba(15,23,42,0.06); }
    .status-chip { display:inline-flex; align-items:center; gap:0.35rem; padding:0.25rem 0.55rem; border-radius:999px; font-size:10px; font-weight:900; letter-spacing:0.03em; text-transform:uppercase; white-space:nowrap; }
    .status-chip-confirmada { background:#dcfce7; color:#15803d; }
    .status-chip-agendada { background:#ffedd5; color:#c2410c; animation: softPulse 1.8s ease infinite; }
    .document-upload-card { min-height: 176px; border-style: dashed !important; border-width: 2px !important; border-radius: 26px !important; background: linear-gradient(180deg, rgba(248,250,252,0.96), rgba(241,245,249,0.86)); }
    .document-upload-card:hover { background: #f8fafc; border-color: #93c5fd !important; }
    .floating-quick-buy { position: fixed; right: 18px; bottom: 94px; z-index: 45; box-shadow: 0 18px 35px rgba(37,99,235,0.28); }
    @media (min-width: 768px) { .floating-quick-buy { display: none; } }
  </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans antialiased pb-20 md:pb-0 md:pt-16" id="app-body">

  <!-- Header -->
  <header id="main-header" class="bg-white text-blue-700 p-4 shadow-sm md:fixed md:top-0 md:w-full md:z-40 flex justify-between items-center border-b border-slate-200">
    <div class="flex items-center gap-3">
      <img src="https://farmacia.kaioadriel.com.br/icone/images.png" alt="Logo" class="h-8 w-8 object-contain rounded-md">
      <h1 class="text-base sm:text-lg font-bold text-slate-800 leading-tight break-words max-w-[200px] sm:max-w-xs">Controle de Farmácias</h1>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="location.reload()" class="bg-slate-100 text-slate-600 text-[10px] sm:text-xs font-bold px-3 py-1.5 rounded-full hover:bg-slate-200 transition flex items-center gap-1 active:scale-95">
        <i class="fa-solid fa-rotate"></i> Recarregar
      </button>
    </div>
  </header>

  <!-- Main Content Area -->
  <main id="main-content" class="w-full max-w-6xl mx-auto md:p-4 md:flex md:gap-6 mt-4 md:mt-0">

    <!-- Desktop Sidebar -->
    <aside class="hidden md:block w-64 shrink-0">
      <div class="bg-white rounded-xl shadow-sm p-4 sticky top-24 border border-slate-100">
        <div class="flex items-center gap-3 mb-6 p-2 bg-slate-50 rounded-lg border border-slate-100">
          <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold">U</div>
          <div class="min-w-0">
            <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">Usuário</p>
            <p class="text-sm font-bold text-slate-800 truncate">Visitante</p>
          </div>
        </div>
        <nav class="flex flex-col gap-2">
          <button onclick="switchView('dashboard')" class="nav-btn-desktop text-left p-3 rounded-lg hover:bg-slate-100 flex items-center gap-3 active-nav-desktop bg-blue-50 text-blue-600" data-target="dashboard">
            <i class="fa-solid fa-house w-5"></i> Dashboard
          </button>
          <button onclick="switchView('compras')" class="nav-btn-desktop text-left p-3 rounded-lg hover:bg-slate-100 flex items-center gap-3" data-target="compras">
            <i class="fa-solid fa-cart-shopping w-5 text-orange-500"></i> Compras
          </button>
          <button onclick="switchView('erp-categories')" class="nav-btn-desktop text-left p-3 rounded-lg hover:bg-slate-100 flex items-center gap-3" data-target="erp">
            <i class="fa-regular fa-folder-open w-5 text-yellow-500"></i> Cadastros
          </button>
        </nav>
      </div>
    </aside>

    <div class="flex-1 px-4 md:px-0 w-full" id="main-view-container">

      <!-- Dashboard View -->
      <section id="view-dashboard" class="view-section">
        <div class="flex justify-between items-center mb-4 md:mb-6">
          <h2 class="text-2xl font-bold text-slate-800">Visão Geral</h2>
          <button onclick="openCompraForm()" class="bg-blue-600 text-white px-4 py-2.5 text-sm md:text-base rounded-xl font-bold shadow-md hover:bg-blue-700 transition active:scale-95 flex items-center gap-2">
            <i class="fa-solid fa-cart-plus"></i> <span>Nova Compra</span>
          </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
          <div class="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-full">
            <div class="flex justify-between items-center mb-4">
              <h3 class="font-bold text-slate-700"><i class="fa-solid fa-clock-rotate-left text-orange-500 mr-2"></i>Últimas Compras</h3>
              <button onclick="switchView('compras')" class="text-xs font-bold text-blue-600 hover:underline">Ver Todas</button>
            </div>
            <div id="dashboard-recent-compras" class="space-y-3 flex-1 overflow-y-auto">
              <p class="text-center text-slate-400 py-10 text-sm">Nenhuma compra registrada.</p>
            </div>
          </div>

          <div class="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col">
            <div class="flex justify-between items-center mb-2">
              <h3 class="font-bold text-slate-700">Histórico</h3>
            </div>
            <div class="text-3xl font-black text-blue-600 mb-4" id="chart-total-label">R$ 0,00</div>
            <div class="h-56 w-full relative mt-auto"><canvas id="mainChart"></canvas></div>
          </div>
        </div>
      </section>

      <!-- Compras View -->
      <section id="view-compras" class="view-section hidden">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold text-slate-800">Compras</h2>
          <button onclick="openCompraForm()" class="bg-blue-600 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center hover:bg-blue-700 transition active:scale-95 text-xl">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>

        <!-- FILTROS INTEGRADOS -->
        <div class="mb-4">
          <div class="flex items-center gap-2">
            <button onclick="toggleCompraFilters()" class="flex-1 bg-white border border-slate-200 rounded-2xl px-4 py-3 shadow-sm flex items-center justify-between active:scale-[0.98] transition">
              <span class="flex items-center gap-2 font-black text-slate-700 text-sm">
                <i class="fa-solid fa-filter text-blue-600"></i>
                Filtros
                <span id="filter-count-badge" class="hidden bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full font-black">0</span>
              </span>
              <i id="filter-chevron" class="fa-solid fa-chevron-down text-slate-400 text-xs transition-transform"></i>
            </button>

            <button onclick="clearCompraFilters()" class="bg-slate-100 text-slate-600 border border-slate-200 rounded-2xl px-3 py-3 shadow-sm active:scale-95 transition" title="Limpar filtros">
              <i class="fa-solid fa-eraser"></i>
            </button>
          </div>

          <div id="compra-filters-panel" class="hidden bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mt-3">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
              <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-wider ml-1">Farmácia</label>
                <select id="filter-farmacia" onchange="handleCompraFilterChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="">Todas</option>
                </select>
              </div>
              <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-wider ml-1">Paciente</label>
                <select id="filter-paciente" onchange="handleCompraFilterChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="">Todas</option>
                </select>
              </div>
              <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-wider ml-1">Clínica</label>
                <select id="filter-clinica" onchange="handleCompraFilterChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="">Todas</option>
                </select>
              </div>
              <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-wider ml-1">Médico</label>
                <select id="filter-medico" onchange="handleCompraFilterChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="">Todas</option>
                </select>
              </div>
              <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-wider ml-1">Remédio</label>
                <select id="filter-remedio" onchange="handleCompraFilterChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="">Todas</option>
                </select>
              </div>
            </div>
            <div class="mt-4 flex justify-end">
                <button onclick="clearCompraFilters()" class="text-[10px] font-bold text-slate-400 hover:text-blue-600 flex items-center gap-1">
                    <i class="fa-solid fa-eraser"></i> Limpar filtros
                </button>
            </div>
          </div>
        </div>

        <div id="list-compras" class="space-y-4"></div>
      </section>

      <!-- ERP Categories View -->
      <section id="view-erp-categories" class="view-section hidden">
        <h2 class="text-2xl font-bold text-slate-800 mb-6">Cadastros</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
          <button onclick="switchErpTab('pacientes')" class="quick-action-card p-6 flex flex-col items-center gap-3">
            <i class="fa-solid fa-user-injured text-3xl text-blue-500"></i>
            <span class="font-bold text-slate-700">Pacientes</span>
          </button>
          <button onclick="switchErpTab('farmacias')" class="quick-action-card p-6 flex flex-col items-center gap-3">
            <i class="fa-solid fa-prescription-bottle-medical text-3xl text-green-500"></i>
            <span class="font-bold text-slate-700">Farmácias</span>
          </button>
          <button onclick="switchErpTab('clinicas')" class="quick-action-card p-6 flex flex-col items-center gap-3">
            <i class="fa-solid fa-hospital text-3xl text-red-500"></i>
            <span class="font-bold text-slate-700">Clínicas</span>
          </button>
          <button onclick="switchErpTab('medicos')" class="quick-action-card p-6 flex flex-col items-center gap-3">
            <i class="fa-solid fa-user-doctor text-3xl text-purple-500"></i>
            <span class="font-bold text-slate-700">Médicos</span>
          </button>
          <button onclick="switchErpTab('remedios')" class="quick-action-card p-6 flex flex-col items-center gap-3">
            <i class="fa-solid fa-pills text-3xl text-orange-500"></i>
            <span class="font-bold text-slate-700">Remédios</span>
          </button>
        </div>
      </section>

      <!-- ERP List View -->
      <section id="view-erp-list" class="view-section hidden">
        <div class="flex items-center gap-3 mb-6">
          <button onclick="switchView('erp-categories')" class="w-10 h-10 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-500 hover:bg-slate-50">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <h2 id="erp-list-title" class="text-2xl font-bold text-slate-800">...</h2>
          <button onclick="openErpForm()" class="ml-auto bg-blue-600 text-white w-10 h-10 rounded-full shadow-md flex items-center justify-center hover:bg-blue-700">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>
        <div id="list-erp" class="space-y-3"></div>
      </section>

    </div>
  </main>

  <!-- Mobile Nav -->
  <nav id="mobile-nav" class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center p-2 md:hidden z-40">
    <button onclick="switchView('dashboard')" class="flex flex-col items-center gap-1 p-2 text-slate-400" id="nav-mobile-dashboard">
      <i class="fa-solid fa-chart-simple text-lg"></i>
      <span class="text-[10px] font-bold">Dash</span>
    </button>
    <button onclick="switchView('compras')" class="flex flex-col items-center gap-1 p-2 text-blue-600 border-t-2 border-blue-600" id="nav-mobile-compras">
      <i class="fa-solid fa-cart-shopping text-lg"></i>
      <span class="text-[10px] font-bold">Compras</span>
    </button>
    <button onclick="switchView('erp-categories')" class="flex flex-col items-center gap-1 p-2 text-slate-400" id="nav-mobile-erp">
      <i class="fa-solid fa-folder-open text-lg"></i>
      <span class="text-[10px] font-bold">Cadastros</span>
    </button>
  </nav>

  <!-- Floating Button -->
  <button onclick="openCompraForm()" class="floating-quick-buy w-14 h-14 bg-blue-600 text-white rounded-full shadow-xl flex items-center justify-center text-2xl active:scale-90 transition md:hidden">
    <i class="fa-solid fa-cart-plus"></i>
  </button>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-end md:items-center justify-center p-0 md:p-4 hidden opacity-0 transition-opacity duration-300">
    <div id="modal-content" class="bg-white w-full max-w-lg rounded-t-[32px] md:rounded-[32px] shadow-2xl flex flex-col max-h-[90vh] translate-y-full md:translate-y-0 md:scale-95 transition-transform duration-300">
      <div class="p-6 border-b border-slate-100 flex justify-between items-center">
        <h3 id="modal-title" class="text-xl font-black text-slate-800">Título</h3>
        <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-slate-100"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="modal-body" class="p-6 overflow-y-auto flex-1"></div>
      <div id="modal-footer" class="p-6 border-t border-slate-100 flex gap-3"></div>
    </div>
  </div>

  <script>
    // ESTADO DA APLICAÇÃO
    const AppState = {
      view: 'dashboard',
      erpTab: 'pacientes',
      filters: {
        farmacia: '',
        paciente: '',
        clinica: '',
        medico: '',
        remedio: ''
      },
      data: {
        compras: [],
        pacientes: [{id: 'p1', nome: 'João Silva', status: 'ativo'}],
        farmacias: [{id: 'f1', nome: 'Raia - Xavantes - Tupi', status: 'ativo'}],
        clinicas: [{id: 'c1', nome: 'Clínica Central', status: 'ativo'}],
        medicos: [{id: 'm1', nome: 'Dr. Roberto', status: 'ativo'}],
        remedios: [{id: 'r1', nome: 'Tramadol', status: 'ativo'}]
      }
    };

    // INICIALIZAÇÃO
    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      renderCompras();
      renderCompraFilterOptions();
      initChart();
      switchView('dashboard');
    });

    function loadData() {
      const saved = localStorage.getItem('farmacia_data');
      if (saved) {
        const parsed = JSON.parse(saved);
        AppState.data = {...AppState.data, ...parsed};
      }
    }

    function saveData() {
      localStorage.setItem('farmacia_data', JSON.stringify(AppState.data));
    }

    // NAVEGAÇÃO
    function switchView(view) {
      AppState.view = view;
      document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
      
      if (view === 'erp-categories') {
        document.getElementById('view-erp-categories').classList.remove('hidden');
      } else if (view === 'erp-list') {
        document.getElementById('view-erp-list').classList.remove('hidden');
      } else {
        document.getElementById('view-' + view).classList.remove('hidden');
      }

      // Update Nav
      document.querySelectorAll('.nav-btn-desktop').forEach(b => {
        b.classList.remove('bg-blue-50', 'text-blue-600');
        if (b.getAttribute('data-target') === (view.startsWith('erp') ? 'erp' : view)) {
          b.classList.add('bg-blue-50', 'text-blue-600');
        }
      });

      // Mobile Nav
      document.querySelectorAll('#mobile-nav button').forEach(b => {
        b.classList.remove('text-blue-600', 'border-t-2', 'border-blue-600');
        b.classList.add('text-slate-400');
      });
      const activeMobile = document.getElementById('nav-mobile-' + (view.startsWith('erp') ? 'erp' : view));
      if (activeMobile) {
        activeMobile.classList.add('text-blue-600', 'border-t-2', 'border-blue-600');
        activeMobile.classList.remove('text-slate-400');
      }
    }

    function switchErpTab(tab) {
      AppState.erpTab = tab;
      const titles = {pacientes: 'Pacientes', farmacias: 'Farmácias', clinicas: 'Clínicas', medicos: 'Médicos', remedios: 'Remédios'};
      document.getElementById('erp-list-title').innerText = titles[tab];
      renderErpList();
      switchView('erp-list');
    }

    // FILTROS DE COMPRAS
    function toggleCompraFilters() {
      const panel = document.getElementById('compra-filters-panel');
      const chevron = document.getElementById('filter-chevron');
      panel.classList.toggle('hidden');
      chevron.classList.toggle('rotate-180');
    }

    function renderCompraFilterOptions() {
      const collections = ['farmacia', 'paciente', 'clinica', 'medico', 'remedio'];
      collections.forEach(col => {
        const select = document.getElementById('filter-' + col);
        if (!select) return;
        const dataKey = col === 'farmacia' ? 'farmacias' : col + 's';
        const items = AppState.data[dataKey] || [];
        
        let html = '<option value="">Todas</option>';
        items.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(item => {
          html += `<option value="${item.id}" ${AppState.filters[col] === item.id ? 'selected' : ''}>${item.nome}</option>`;
        });
        select.innerHTML = html;
      });
    }

    function handleCompraFilterChange() {
      AppState.filters.farmacia = document.getElementById('filter-farmacia').value;
      AppState.filters.paciente = document.getElementById('filter-paciente').value;
      AppState.filters.clinica = document.getElementById('filter-clinica').value;
      AppState.filters.medico = document.getElementById('filter-medico').value;
      AppState.filters.remedio = document.getElementById('filter-remedio').value;
      
      updateFilterBadge();
      renderCompras();
    }

    function updateFilterBadge() {
      const count = Object.values(AppState.filters).filter(v => v !== '').length;
      const badge = document.getElementById('filter-count-badge');
      if (count > 0) {
        badge.innerText = count;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    }

    function clearCompraFilters() {
      AppState.filters = { farmacia: '', paciente: '', clinica: '', medico: '', remedio: '' };
      renderCompraFilterOptions();
      updateFilterBadge();
      renderCompras();
    }

    // RENDERIZAÇÃO DE LISTAS
    function renderCompras() {
      const list = document.getElementById('list-compras');
      const recentList = document.getElementById('dashboard-recent-compras');
      
      let filtered = AppState.data.compras;
      
      if (AppState.filters.farmacia) filtered = filtered.filter(c => c.farmaciaId === AppState.filters.farmacia);
      if (AppState.filters.paciente) filtered = filtered.filter(c => c.pacienteId === AppState.filters.paciente);
      if (AppState.filters.clinica) filtered = filtered.filter(c => c.clinicaId === AppState.filters.clinica);
      if (AppState.filters.medico) filtered = filtered.filter(c => c.medicoId === AppState.filters.medico);
      if (AppState.filters.remedio) filtered = filtered.filter(c => c.remedioId === AppState.filters.remedio);

      const sorted = [...filtered].sort((a,b) => new Date(b.data) - new Date(a.data));
      
      const html = sorted.length ? sorted.map(c => generateCompraCard(c)).join('') : '<p class="text-center text-slate-400 py-10">Nenhuma compra encontrada com esses filtros.</p>';
      list.innerHTML = html;
      
      // Dashboard Recent
      const recent = [...AppState.data.compras].sort((a,b) => new Date(b.data) - new Date(a.data)).slice(0, 5);
      recentList.innerHTML = recent.length ? recent.map(c => generateCompraCard(c, true)).join('') : '<p class="text-center text-slate-400 py-10 text-sm">Nenhuma compra registrada.</p>';
      
      updateChart();
    }

    function generateCompraCard(c, compact = false) {
      const farmacia = AppState.data.farmacias.find(f => f.id === c.farmaciaId)?.nome || 'Farmácia não definida';
      const remedio = AppState.data.remedios.find(r => r.id === c.remedioId)?.nome || 'Remédio';
      const paciente = AppState.data.pacientes.find(p => p.id === c.pacienteId)?.nome || '';
      
      const diff = Math.floor((new Date() - new Date(c.data)) / (1000 * 60 * 60 * 24));
      const tempo = diff === 0 ? 'Hoje' : `Há ${diff} dias`;

      return `
        <div onclick="editCompra('${c.id}')" class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition cursor-pointer">
          <div class="flex justify-between items-start mb-2">
            <div>
              <h4 class="font-black text-slate-800 text-sm">${farmacia}</h4>
              <p class="text-[10px] font-bold text-blue-600 uppercase">${tempo}</p>
            </div>
            <span class="status-chip ${c.status === 'confirmada' ? 'status-chip-confirmada' : 'status-chip-agendada'}">${c.status}</span>
          </div>
          <div class="flex items-center gap-3 mt-3">
            <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400">
              <i class="fa-solid fa-pills"></i>
            </div>
            <div class="flex-1">
              <p class="text-sm font-bold text-slate-700">${remedio}</p>
              ${paciente ? `<p class="text-xs text-slate-400 font-medium">${paciente}</p>` : ''}
            </div>
            <div class="text-right">
              <p class="text-sm font-black text-slate-800">R$ ${c.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
              <p class="text-[10px] font-bold text-slate-400">${c.qtd} un.</p>
            </div>
          </div>
        </div>
      `;
    }

    function renderErpList() {
      const list = document.getElementById('list-erp');
      const items = AppState.data[AppState.erpTab] || [];
      list.innerHTML = items.length ? items.map(i => `
        <div onclick="openErpForm('${i.id}')" class="bg-white p-4 rounded-xl border border-slate-100 flex justify-between items-center cursor-pointer hover:bg-slate-50">
          <span class="font-bold text-slate-700">${i.nome}</span>
          <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
        </div>
      `).join('') : '<p class="text-center text-slate-400 py-10">Nenhum registro encontrado.</p>';
    }

    // MODAIS E FORMULÁRIOS
    function openModal(title, body, footer) {
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-body').innerHTML = body;
      document.getElementById('modal-footer').innerHTML = footer;
      const overlay = document.getElementById('modal-overlay');
      const content = document.getElementById('modal-content');
      overlay.classList.remove('hidden');
      setTimeout(() => {
        overlay.classList.remove('opacity-0');
        content.classList.remove('translate-y-full', 'scale-95');
      }, 10);
    }

    function closeModal() {
      const overlay = document.getElementById('modal-overlay');
      const content = document.getElementById('modal-content');
      overlay.classList.add('opacity-0');
      content.classList.add('translate-y-full');
      setTimeout(() => overlay.classList.add('hidden'), 300);
    }

    function openCompraForm(id = null) {
      const c = id ? AppState.data.compras.find(x => x.id === id) : {id: '', data: new Date().toISOString().split('T')[0], farmaciaId: '', remedioId: '', pacienteId: '', clinicaId: '', medicoId: '', valor: 0, qtd: 1, status: 'confirmada'};
      
      const html = `
        <div class="space-y-4">
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Data</label>
            <input type="date" id="f-data" value="${c.data}" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Farmácia</label>
              <select id="f-farmacia" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm">
                <option value="">Selecione...</option>
                ${AppState.data.farmacias.map(f => `<option value="${f.id}" ${f.id === c.farmaciaId ? 'selected' : ''}>${f.nome}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Remédio</label>
              <select id="f-remedio" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm">
                <option value="">Selecione...</option>
                ${AppState.data.remedios.map(r => `<option value="${r.id}" ${r.id === c.remedioId ? 'selected' : ''}>${r.nome}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Paciente</label>
              <select id="f-paciente" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm">
                <option value="">Selecione...</option>
                ${AppState.data.pacientes.map(p => `<option value="${p.id}" ${p.id === c.pacienteId ? 'selected' : ''}>${p.nome}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Clínica</label>
              <select id="f-clinica" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm">
                <option value="">Selecione...</option>
                ${AppState.data.clinicas.map(cl => `<option value="${cl.id}" ${cl.id === c.clinicaId ? 'selected' : ''}>${cl.nome}</option>`).join('')}
              </select>
            </div>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Médico</label>
            <select id="f-medico" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm">
              <option value="">Selecione...</option>
              ${AppState.data.medicos.map(m => `<option value="${m.id}" ${m.id === c.medicoId ? 'selected' : ''}>${m.nome}</option>`).join('')}
            </select>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Valor (R$)</label>
              <input type="number" step="0.01" id="f-valor" value="${c.valor}" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm">
            </div>
            <div>
              <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Qtd</label>
              <input type="number" id="f-qtd" value="${c.qtd}" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm">
            </div>
          </div>
        </div>
      `;

      const footer = `
        <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold">Cancelar</button>
        <button onclick="saveCompra('${id}')" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md">Salvar</button>
      `;

      openModal(id ? 'Editar Compra' : 'Nova Compra', html, footer);
    }

    function saveCompra(id) {
      const data = {
        id: id || 'c' + Date.now(),
        data: document.getElementById('f-data').value,
        farmaciaId: document.getElementById('f-farmacia').value,
        remedioId: document.getElementById('f-remedio').value,
        pacienteId: document.getElementById('f-paciente').value,
        clinicaId: document.getElementById('f-clinica').value,
        medicoId: document.getElementById('f-medico').value,
        valor: parseFloat(document.getElementById('f-valor').value) || 0,
        qtd: parseInt(document.getElementById('f-qtd').value) || 1,
        status: 'confirmada'
      };

      if (id) {
        const idx = AppState.data.compras.findIndex(x => x.id === id);
        AppState.data.compras[idx] = data;
      } else {
        AppState.data.compras.push(data);
      }

      saveData();
      closeModal();
      renderCompras();
    }

    function openErpForm(id = null) {
      const item = id ? AppState.data[AppState.erpTab].find(x => x.id === id) : {id: '', nome: ''};
      const html = `
        <div>
          <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nome</label>
          <input type="text" id="f-erp-nome" value="${item.nome}" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm" placeholder="Digite o nome...">
        </div>
      `;
      const footer = `
        <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold">Cancelar</button>
        <button onclick="saveErp('${id}')" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md">Salvar</button>
      `;
      openModal(id ? 'Editar Registro' : 'Novo Registro', html, footer);
    }

    function saveErp(id) {
      const nome = document.getElementById('f-erp-nome').value;
      if (!nome) return;

      if (id) {
        const idx = AppState.data[AppState.erpTab].findIndex(x => x.id === id);
        AppState.data[AppState.erpTab][idx].nome = nome;
      } else {
        AppState.data[AppState.erpTab].push({id: AppState.erpTab[0] + Date.now(), nome, status: 'ativo'});
      }

      saveData();
      closeModal();
      renderErpList();
      renderCompraFilterOptions();
    }

    function editCompra(id) {
      openCompraForm(id);
    }

    // GRÁFICO
    let mainChart;
    function initChart() {
      const ctx = document.getElementById('mainChart').getContext('2d');
      mainChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
          datasets: [{
            label: 'Gastos',
            data: [0, 0, 0, 0, 0, 0],
            borderColor: '#2563eb',
            backgroundColor: 'rgba(37, 99, 235, 0.1)',
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, display: false }, x: { grid: { display: false } } }
        }
      });
      updateChart();
    }

    function updateChart() {
      if (!mainChart) return;
      const total = AppState.data.compras.reduce((acc, c) => acc + c.valor, 0);
      document.getElementById('chart-total-label').innerText = total.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
      
      // Simulação de dados por mês
      const data = [total * 0.1, total * 0.3, total * 0.2, total * 0.5, total * 0.4, total];
      mainChart.data.datasets[0].data = data;
      mainChart.update();
    }
  </script>
</body>
</html>
