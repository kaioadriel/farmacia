        const formatCurrency = (value) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);
        };

        const maskCurrency = (v) => {
            if (!v) return "";
            v = String(v).replace(/\D/g, "");
            if (v === "") return "";
            v = (parseInt(v, 10) / 100).toFixed(2);
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
            return v;
        };

        const parseCurrency = (v) => {
            if (!v) return 0;
            return parseFloat(String(v).replace(/\./g, "").replace(",", "."));
        };

        const maskCPF = (v) => v.replace(/\D/g, '').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2').slice(0, 14);
        const maskRG = (v) => v.replace(/\D/g, '').replace(/(\d{2})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1})$/, '$1-$2').slice(0, 12);
        const maskPhone = (v) => v.replace(/\D/g, '').replace(/(\d{2})(\d)/, '($1) $2').replace(/(\d{5})(\d{4})$/, '$1.$2').slice(0, 15);
        const maskCEP = (v) => v.replace(/\D/g, '').replace(/(\d{5})(\d{3})$/, '$1-$2').slice(0, 9);

        const getAge = (dateString) => {
            if (!dateString) return '';
            const today = new Date();
            const birthDate = new Date(dateString + 'T12:00:00');
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) { age--; }
            return age;
        };

        };

            // --- LÓGICA DE DADOS E NUVEM ---
            const updateCloud = (updates) => {

                    patients: updates.patients || patients,
                    pharmacies: updates.pharmacies || pharmacies,
                    clinics: updates.clinics || clinics,
                    doctors: updates.doctors || doctors,
                    medicaments: updates.medicaments || medicaments
                };

            };

            const calculateDaysAgo = (dateStr) => {
                if (!dateStr) return null;
                const today = new Date(getTodayDateStr() + 'T12:00:00');
                const pastDate = new Date(dateStr + 'T12:00:00');
                const diffTime = today - pastDate;
                return Math.floor(diffTime / (1000 * 60 * 60 * 24));
            };

            const getLastPurchaseData = (entityType, name) => {
                 if (!name) return { daysAgo: null, text: "Sem compras" };
                 const purchases = replenishments.filter(r => r[entityType] === name);
                 if (purchases.length === 0) return { daysAgo: null, text: "Sem compras" };
                 const latest = purchases.reduce((a, b) => new Date(a.date) > new Date(b.date) ? a : b);
                 const days = calculateDaysAgo(latest.date);
                 let text = `Há ${days} dias`;
                 if (days === 0) text = "Hoje";
                 if (days === 1) text = "Ontem";
                 return { daysAgo: days, text };
            };

            const isMissingInfo = (item) => {
                return Object.keys(item).length <= 4; // Allow for status default
            };

            const sortEntitiesByPurchase = (list, type) => {
                return [...list].sort((a, b) => {
                    const daysA = getLastPurchaseData(type, a.name).daysAgo;
                    const daysB = getLastPurchaseData(type, b.name).daysAgo;
                    if (daysA === null && daysB === null) return 0;
                    if (daysA === null) return 1;
                    if (daysB === null) return -1;
                    return daysA - daysB;
                });
            };

            // --- LÓGICA DO DASHBOARD ---
            const insightData = useMemo(() => {
                const stats = {};
                replenishments.forEach(r => {
                    let typeMap = { 'medicamento': 'medicamento', 'pharmacy': 'pharmacy', 'patient': 'patient', 'clinic': 'clinic', 'doctor': 'doctor' };
                    const name = r[typeMap[insightTab]];
                    if (name) {
                        if (!stats[name]) stats[name] = { count: 0, latestDate: r.date };
                        stats[name].count += 1;
                        if (new Date(r.date) > new Date(stats[name].latestDate)) { stats[name].latestDate = r.date; }
                    }
                });
                
                const dataArray = Object.entries(stats).map(([name, data]) => ({ 
                    name, count: data.count, daysAgo: calculateDaysAgo(data.latestDate), latestDate: data.latestDate
                }));

                if (insightMode === 'top') {
                    const oneYearAgo = new Date(); oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
                    return dataArray.filter(d => new Date(d.latestDate) >= oneYearAgo).sort((a, b) => b.count - a.count || a.daysAgo - b.daysAgo).slice(0, 5);
                } else {
                    return dataArray.sort((a, b) => new Date(b.latestDate) - new Date(a.latestDate)).slice(0, 5);
                }
            }, [replenishments, insightTab, insightMode]);

            const dashStats = useMemo(() => {
                const currentYearStr = String(currentYear);
                const comprasAnoAtual = replenishments.filter(r => r.date.startsWith(currentYearStr));
                const gastoAnoAtual = comprasAnoAtual.reduce((acc, curr) => acc + (Number(curr.valor) || 0), 0);
                return { gastoAnoAtual, totalComprasAnoAtual: comprasAnoAtual.length };
            }, [replenishments, currentYear]);

            const dashChartData = useMemo(() => {
                const data = [];
                const prevYearStr = String(currentYear - 1);
                
                const prevYearPurchases = replenishments.filter(r => r.date.startsWith(prevYearStr));
                const prevTotal = chartMode === 'qty' ? prevYearPurchases.length : prevYearPurchases.reduce((acc, curr) => acc + (Number(curr.valor) || 0), 0);
                data.push({ name: prevYearStr, Total: prevTotal });

                const monthNames = ['JAN', 'FEV', 'MAR', 'ABR', 'MAI', 'JUN', 'JUL', 'AGO', 'SET', 'OUT', 'NOV', 'DEZ'];
                for (let i = 1; i <= 12; i++) {
                    const monthPrefix = `${currentYear}-${String(i).padStart(2, '0')}`;
                    const monthPurchases = replenishments.filter(r => r.date.startsWith(monthPrefix));
                    const mTotal = chartMode === 'qty' ? monthPurchases.length : monthPurchases.reduce((acc, curr) => acc + (Number(curr.valor) || 0), 0);
                    data.push({ name: monthNames[i-1], Total: mTotal });

                return data;
            }, [replenishments, chartMode, currentYear]);

                if(tabName === 'clinics') defaultData = { ...defaultData, especialidade:'', medicoResponsavel:'', endereco:'', telefone:'' };

                setEntityData(prev => ({ ...prev, cep: cepMascara }));
                const cleanCEP = cepMascara.replace(/\D/g, '');
                if (cleanCEP.length === 8) {
                    try {
                        const res = await fetch(`https://viacep.com.br/ws/${cleanCEP}/json/`);

                    } catch (err) {}
                }

            const handleDocumentUpload = (e, entityId) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX = 800; let w = img.width; let h = img.height;
                        if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } } else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                        canvas.width = w; canvas.height = h; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);

                        const updated = patients.map(p => p.id === entityId ? { ...p, documentImage: dataUrl } : p);
                        setPatients(updated); updateCloud({ patients: updated });
                        if (selectedEntity && selectedEntity.id === entityId) { setSelectedEntity({ ...selectedEntity, documentImage: dataUrl }); }
                        showToast("Documento salvo!");
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            };

                    } : r);

                });

                                <div className="flex space-x-3">
                                    <button onClick={()=>setShowEntityModal(false)} className="flex-1 py-4 text-xs font-black text-slate-400 uppercase bg-slate-100 rounded-2xl active:scale-95 transition-all">Cancelar</button>
                                    <button onClick={handleSaveEntity} className="flex-[2] py-4 bg-slate-800 text-white text-xs font-black rounded-2xl uppercase shadow-lg shadow-slate-900/30 active:scale-95 transition-all">Salvar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Detalhes Entidade (Ver Mais) */}
                    {selectedEntity && activeTab !== 'purchases' && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl border-t-8 border-slate-800 animate-fade overflow-y-auto max-h-[90vh]">
                                <div className="flex justify-between items-start mb-4">
                                    <h2 className="text-xl font-black italic uppercase text-slate-800">Ficha Detalhada</h2>
                                    <button onClick={() => setSelectedEntity(null)} className="text-slate-400 hover:text-slate-600 p-2"><IconX /></button>
                                </div>
                                
                                <div className="mb-6 text-center">
                                    <h3 className="text-2xl font-black text-slate-800 leading-tight">
                                        {activeTab === 'clinics' ? formatClinicName(selectedEntity.name) : activeTab === 'doctors' ? formatDoctorName(selectedEntity.name) : selectedEntity.name}
                                    </h3>
                                    <p className="text-[10px] font-black text-emerald-500 mt-1 uppercase tracking-[0.2em]">(Última compra: {getLastPurchaseData(getEntityKeyForPurchase(activeTab), selectedEntity.name).text})</p>
                                </div>

                                <div className="space-y-4 mb-6 bg-slate-50 p-6 rounded-3xl border border-slate-100">
                                    <div className="grid grid-cols-2 gap-y-4 gap-x-2 text-left">
                                        
                                        {activeTab === 'patients' && (
                                            <>
                                                <div><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">CPF</p><p className="text-sm font-bold text-slate-800">{selectedEntity.cpf || '-'}</p></div>
                                                <div><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">RG</p><p className="text-sm font-bold text-slate-800">{selectedEntity.rg || '-'}</p></div>
                                                <div className="col-span-2 flex justify-between items-center border-t border-b border-slate-200 py-3 my-1">
                                                    <div><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Nascimento</p><p className="text-base font-bold text-slate-800">{selectedEntity.birthDate ? new Date(selectedEntity.birthDate + 'T12:00:00').toLocaleDateString('pt-BR') : '-'}{selectedEntity.birthDate && <span className="text-indigo-500 font-black ml-2 text-xs uppercase tracking-tighter italic">({getAge(selectedEntity.birthDate)} anos)</span>}</p></div>
                                                </div>
                                                <div className="col-span-2"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Endereço Completo</p><p className="text-sm font-bold text-slate-800 leading-snug">{selectedEntity.rua ? `${selectedEntity.rua}, ${selectedEntity.numero || 'S/N'} ${selectedEntity.complemento ? ' - ' + selectedEntity.complemento : ''}` : '-'}</p><p className="text-[11px] font-bold text-slate-500 mt-1">{selectedEntity.bairro}</p><p className="text-[11px] font-bold text-slate-500">{selectedEntity.cidade ? `${selectedEntity.cidade} - ${selectedEntity.estado}` : ''}</p><p className="text-sm font-black text-slate-700 mt-2">CEP: {selectedEntity.cep || '-'}</p></div>
                                                <div className="col-span-2 border-t border-slate-200 pt-3 mt-1"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Clínica Associada</p><p className="text-sm font-bold text-slate-800">{selectedEntity.clinic || '-'}</p></div>
                                                <div className="col-span-2"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Telefone</p><p className="text-sm font-bold text-slate-800">{selectedEntity.phone || '-'}</p></div>
                                                <div className="col-span-2"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">E-mail</p><p className="text-sm font-bold text-slate-800 break-all">{selectedEntity.email || '-'}</p></div>
                                            </>
                                        )}

                                        {activeTab === 'pharmacies' && (
                                            <>
                                                <div className="col-span-2"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Endereço</p><p className="text-sm font-bold text-slate-800 leading-snug">{selectedEntity.endereco || '-'}</p></div>
                                                <div className="col-span-2"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Telefone</p><p className="text-sm font-bold text-slate-800">{selectedEntity.telefone || '-'}</p></div>
                                            </>
                                        )}

                                        {activeTab === 'clinics' && (
                                            <>
                                                <div className="col-span-2"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Especialidade</p><p className="text-sm font-bold text-slate-800 leading-snug">{selectedEntity.especialidade || '-'}</p></div>
                                                <div className="col-span-2"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Médico Responsável</p><p className="text-sm font-bold text-slate-800 leading-snug">{selectedEntity.medicoResponsavel || '-'}</p></div>
                                                <div className="col-span-2"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Endereço</p><p className="text-sm font-bold text-slate-800 leading-snug">{selectedEntity.endereco || '-'}</p></div>
                                                <div className="col-span-2"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Telefone</p><p className="text-sm font-bold text-slate-800">{selectedEntity.telefone || '-'}</p></div>
                                            </>
                                        )}

                                        {activeTab === 'doctors' && (
                                            <>
                                                <div className="col-span-2"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Especialidade</p><p className="text-sm font-bold text-slate-800 leading-snug">{selectedEntity.especialidade || '-'}</p></div>
                                                <div className="col-span-2">
                                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">CRM</p>
                                                    <div className="flex items-center">
                                                        <p className="text-sm font-bold text-slate-800">{selectedEntity.crm || '-'} {selectedEntity.uf ? `/${selectedEntity.uf}` : ''}</p>
                                                        {selectedEntity.crm && (
                                                            <button onClick={() => fallbackCopyTextToClipboard(selectedEntity.crm)} className="ml-2 p-1 text-slate-400 hover:text-indigo-600 transition-colors" title="Copiar CRM">
                                                                <IconCopy />
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                                <div><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">RQE</p><p className="text-sm font-bold text-slate-800">{selectedEntity.rqe || '-'}</p></div>
                                            </>
                                        )}

                                        {activeTab === 'medicaments' && (
                                            <>
                                                <div className="col-span-2"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Dosagens</p><p className="text-sm font-bold text-slate-800 leading-snug">{selectedEntity.dosagens || '-'}</p></div>
                                                <div className="col-span-2"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Tipo</p><p className="text-sm font-bold text-slate-800">{selectedEntity.tipo || '-'}</p></div>
                                            </>
                                        )}

                                        <div className="col-span-2 border-t border-slate-200 pt-3 mt-1">
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Status</p>
                                            <p className={`text-sm font-black ${selectedEntity.status === 'Inativo' ? 'text-rose-500' : 'text-emerald-500'}`}>{selectedEntity.status || 'Ativo'}</p>
                                        </div>

                                        <div className="col-span-2 border-t border-slate-200 pt-3 mt-1">
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Observações</p>
                                            <p className="text-sm font-bold text-slate-800 break-words whitespace-pre-wrap">{selectedEntity.observacoes || '-'}</p>
                                        </div>

                                        {activeTab === 'doctors' && (
                                            <div className="col-span-2 mt-2 flex justify-center">
                                                <button onClick={() => copyAndOpenCrm(selectedEntity.crm)} className="w-full py-4 bg-indigo-50 border border-indigo-200 text-indigo-600 text-xs font-black rounded-2xl uppercase flex items-center justify-center active:scale-95 transition-all shadow-sm hover:bg-indigo-100">
                                                    <span className="mr-2"><IconExternalLink /></span> Consultar Status no CREMESP
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* UPLOAD DE IMAGEM APENAS PARA PACIENTES */}
                                {activeTab === 'patients' && (
                                    <div className="mb-8">
                                        <input type="file" ref={uploadInputRef} className="hidden" accept="image/*,.pdf" onChange={(e) => handleDocumentUpload(e, selectedEntity.id)} />
                                        {selectedEntity.documentImage ? (
                                            <div className="flex gap-2">
                                                <button onClick={() => setViewingImage(selectedEntity.documentImage)} className="flex-1 py-4 bg-indigo-50 border border-indigo-200 text-indigo-600 text-xs font-black rounded-2xl uppercase flex items-center justify-center active:scale-95 transition-all shadow-sm">
                                                    <span className="mr-2"><IconEye /></span> Ver Documento
                                                </button>
                                                <button onClick={() => removeDocument(selectedEntity.id)} className="px-5 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center hover:bg-rose-100 transition-colors" title="Apagar Documento">
                                                    <IconX />
                                                </button>
                                            </div>
                                        ) : (
                                            <button onClick={() => { uploadInputRef.current.click(); }} className="w-full py-4 border-2 border-dashed border-indigo-200 text-indigo-500 bg-indigo-50/50 text-xs font-black rounded-2xl uppercase flex items-center justify-center active:scale-95 transition-all hover:bg-indigo-50 hover:border-indigo-300">
                                                <span className="mr-2"><IconFilePlus /></span> Adicionar Documento
                                            </button>
                                        )}
                                    </div>
                                )}

                                <div className="flex space-x-3">
                                    <button onClick={() => handleDeleteEntity(selectedEntity.id, activeTab)} className="flex-1 py-4 bg-rose-50 text-rose-600 text-xs font-black rounded-2xl uppercase flex items-center justify-center active:scale-95 transition-all"><span className="mr-2"><IconTrash /></span> Excluir</button>
                                    <button onClick={() => { setEntityData(selectedEntity); setSelectedEntity(null); setShowEntityModal(true); }} className="flex-1 py-4 bg-slate-900 text-white text-xs font-black rounded-2xl uppercase flex items-center justify-center active:scale-95 transition-all"><span className="mr-2"><IconPencil /></span> Editar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Quick Add */}
                    {quickAdd && (
                        <div className="fixed inset-0 z-[130] flex items-end sm:items-center justify-center p-0 sm:p-6 bg-slate-900/90 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-t-[3rem] sm:rounded-[3rem] p-8 shadow-2xl border-t-8 border-slate-800 animate-slide-up">
                                <h2 className="text-xl font-black text-center italic mb-6 uppercase text-slate-800">Novo(a) {quickAdd.label}</h2>
                                <div className="space-y-4 mb-8">
                                    <input type="text" placeholder={`Nome do(a) ${quickAdd.label}...`} autoFocus className="w-full font-bold bg-slate-50 border border-slate-100 rounded-2xl p-4 text-slate-700 outline-none focus:ring-2 focus:ring-slate-400" value={quickAddValue} onFocus={onInputFocus} onBlur={onInputBlur} onChange={e=>setQuickAddValue(e.target.value)} />
                                </div>
                                <div className="flex space-x-3">
                                    <button onClick={()=>{setQuickAdd(null); setQuickAddValue('');}} className="flex-1 py-4 text-xs font-black text-slate-400 uppercase bg-slate-100 rounded-2xl active:scale-95 transition-all">Cancelar</button>
                                    <button onClick={handleQuickAddSave} className="flex-[2] py-4 bg-slate-800 text-white text-xs font-black rounded-2xl uppercase shadow-lg shadow-slate-900/30 active:scale-95 transition-all">Adicionar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isKeyboardVisible && !forceShowNav && isMobileDevice() && (
                        <div className="fixed bottom-0 left-0 right-0 h-16 z-[45]" onClick={() => setForceShowNav(true)}></div>
                    )}

                    {/* RODAPÉ ORDENADO */}
                    <nav className={`fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-2xl border-t border-slate-100 flex justify-between items-center py-2 px-2 sm:px-6 pb-10 shadow-2xl z-40 transition-transform duration-500 overflow-x-auto scrollbar-hide ${(isKeyboardVisible && !forceShowNav) ? 'translate-y-full opacity-0 pointer-events-none' : 'translate-y-0 opacity-100'}`}>
                        <button onClick={()=>setActiveTab('dashboard')} className={`flex flex-col items-center p-2 min-w-[50px] transition-all ${activeTab === 'dashboard' ? 'tab-active text-slate-800' : 'text-slate-400'}`}><IconHome /><span className="text-[7px] sm:text-[8px] mt-1 uppercase font-black">Início</span></button>
                        <button onClick={()=>setActiveTab('patients')} className={`flex flex-col items-center p-2 min-w-[50px] transition-all ${activeTab === 'patients' ? 'tab-active text-slate-800' : 'text-slate-400'}`}><IconUserSmall /><span className="text-[7px] sm:text-[8px] mt-1 uppercase font-black">Pacientes</span></button>
                        <button onClick={()=>setActiveTab('pharmacies')} className={`flex flex-col items-center p-2 min-w-[50px] transition-all ${activeTab === 'pharmacies' ? 'tab-active text-slate-800' : 'text-slate-400'}`}><IconBuilding /><span className="text-[7px] sm:text-[8px] mt-1 uppercase font-black">Farmácias</span></button>
                        <button onClick={()=>setActiveTab('clinics')} className={`flex flex-col items-center p-2 min-w-[50px] transition-all ${activeTab === 'clinics' ? 'tab-active text-slate-800' : 'text-slate-400'}`}><IconHospital /><span className="text-[7px] sm:text-[8px] mt-1 uppercase font-black">Clínicas</span></button>
                        <button onClick={()=>setActiveTab('doctors')} className={`flex flex-col items-center p-2 min-w-[50px] transition-all ${activeTab === 'doctors' ? 'tab-active text-slate-800' : 'text-slate-400'}`}><IconHeartBeat /><span className="text-[7px] sm:text-[8px] mt-1 uppercase font-black">Médicos</span></button>
                        <button onClick={()=>setActiveTab('medicaments')} className={`flex flex-col items-center p-2 min-w-[50px] transition-all ${activeTab === 'medicaments' ? 'tab-active text-slate-800' : 'text-slate-400'}`}><IconPill /><span className="text-[7px] sm:text-[8px] mt-1 uppercase font-black">Remédios</span></button>
                        <button onClick={()=>setActiveTab('purchases')} className={`flex flex-col items-center p-2 min-w-[50px] transition-all ${activeTab === 'purchases' ? 'tab-active text-slate-800' : 'text-slate-400'}`}><IconBag /><span className="text-[7px] sm:text-[8px] mt-1 uppercase font-black">Compras</span></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
