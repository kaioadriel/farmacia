        const ManualBarChart = ({ data }) => {
            const maxVal = Math.max(...data.map(d => d.Total), 1);
            return (
                <div className="flex items-end justify-between h-full pt-6 pb-2 px-2">
                    {data.map((d, i) => (
                        <div key={i} className="flex flex-col items-center justify-end h-full flex-1">
                            <span className="text-[11px] font-black text-slate-800 mb-1">{d.Total > 0 ? d.Total : ''}</span>
                            <div className="w-full max-w-[28px] rounded-t-lg transition-all duration-500"
                                style={{ height: `${(d.Total / maxVal) * 100}%`, backgroundColor: d.Total > 0 ? '#6366f1' : '#f1f5f9', minHeight: d.Total > 0 ? '6px' : '3px' }}>
                            </div>
                            <span className="text-[9px] font-bold text-slate-400 mt-2">{d.name}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [emailInput, setEmailInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [isRegisterMode, setIsRegisterMode] = useState(false);
            const [authError, setAuthError] = useState('');

            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [status, setStatus] = useState('Local');
            
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('farmacia_app_final_logs') || '{}'));
            const [replenishments, setReplenishments] = useState(() => JSON.parse(localStorage.getItem('farmacia_app_final_supply') || '[]'));
            
            const [patients, setPatients] = useState(() => JSON.parse(localStorage.getItem('farmacia_app_patients') || '[]'));
            const [pharmacies, setPharmacies] = useState(() => JSON.parse(localStorage.getItem('farmacia_app_pharmacies') || '[]'));
            const [clinics, setClinics] = useState(() => JSON.parse(localStorage.getItem('farmacia_app_clinics') || '[]'));
            const [doctors, setDoctors] = useState(() => JSON.parse(localStorage.getItem('farmacia_app_doctors') || '[]'));

            const [manageListType, setManageListType] = useState(null); 
            const [manageItemInput, setManageItemInput] = useState('');
            const [editingItemId, setEditingItemId] = useState(null);
            
            const [insightTab, setInsightTab] = useState('pharmacy');
            const [insightMode, setInsightMode] = useState('top'); // 'top' ou 'recent'

            const [quickAdd, setQuickAdd] = useState(null);
            const [quickAddValue, setQuickAddValue] = useState('');

            const [savingId, setSavingId] = useState(null);
            
            const [isKeyboardVisible, setIsKeyboardVisible] = useState(false);
            const [forceShowNav, setForceShowNav] = useState(false);
            const keyboardTimeoutRef = useRef(null);
            const fileInputRef = useRef(null);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            
            const todayRowRef = useRef(null);

            const [toast, setToast] = useState(null);
            const toastTimeout = useRef(null);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                if (toastTimeout.current) clearTimeout(toastTimeout.current);
                toastTimeout.current = setTimeout(() => setToast(null), 3000);
            };

            const getTodayDateStr = () => new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];

            const isMobileDevice = () => /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            // Auto-scroll ao abrir a aba Lançar
            useEffect(() => {
                if (activeTab === 'agenda' && todayRowRef.current) {
                    setTimeout(() => {
                        todayRowRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 50);
                }
            }, [activeTab]);

            const [showSettings, setShowSettings] = useState(false);

            useEffect(() => {
                const handleBeforeInstallPrompt = (e) => { e.preventDefault(); setDeferredPrompt(e); };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            }, []);

            useEffect(() => {
                const handleResize = () => {
                    if (!isMobileDevice()) {
                        setIsKeyboardVisible(false);
                        return;
                    }
                    if (window.visualViewport) {
                        if (window.visualViewport.height < window.screen.height * 0.7) {
                            if (keyboardTimeoutRef.current) clearTimeout(keyboardTimeoutRef.current);
                            setIsKeyboardVisible(true);
                            setForceShowNav(false);
                        } else {
                            if (keyboardTimeoutRef.current) clearTimeout(keyboardTimeoutRef.current);
                            keyboardTimeoutRef.current = setTimeout(() => {
                                setIsKeyboardVisible(false);
                                setForceShowNav(false);
                            }, 2000); 
                        }
                    }
                };
                if (window.visualViewport) window.visualViewport.addEventListener('resize', handleResize);
                return () => {
                    if (window.visualViewport) window.visualViewport.removeEventListener('resize', handleResize);
                    if (keyboardTimeoutRef.current) clearTimeout(keyboardTimeoutRef.current);
                };
            }, []);

            const [showSupplyModal, setShowSupplyModal] = useState(false);
            const [selectedPurchase, setSelectedPurchase] = useState(null);
            
            const [supplyData, setSupplyData] = useState({ id: null, amount: '', date: getTodayDateStr(), remedio: '', patient: '', pharmacy: '', clinic: '', doctor: '' });

            const estoqueInicialBase = 54;

            const onInputFocus = () => {
                if (!isMobileDevice()) return;
                if (keyboardTimeoutRef.current) clearTimeout(keyboardTimeoutRef.current);
                setIsKeyboardVisible(true);
                setForceShowNav(false);
            };

            const onInputBlur = () => {
                if (!isMobileDevice()) return;
                if (keyboardTimeoutRef.current) clearTimeout(keyboardTimeoutRef.current);
                keyboardTimeoutRef.current = setTimeout(() => {
                    setIsKeyboardVisible(false);
                    setForceShowNav(false);
                }, 2000);
            };

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => { 
                if (!user) return;
                localStorage.setItem('farmacia_app_final_logs', JSON.stringify(logs)); 
                localStorage.setItem('farmacia_app_final_supply', JSON.stringify(replenishments));
                localStorage.setItem('farmacia_app_patients', JSON.stringify(patients)); 
                localStorage.setItem('farmacia_app_pharmacies', JSON.stringify(pharmacies)); 
                localStorage.setItem('farmacia_app_clinics', JSON.stringify(clinics)); 
                localStorage.setItem('farmacia_app_doctors', JSON.stringify(doctors)); 
            }, [logs, replenishments, patients, pharmacies, clinics, doctors, user]);

            useEffect(() => {
                if (!user || !db) {
                    if (!user) setStatus('Bloqueado');
                    return;
                }
                setStatus('A sincronizar...');
                const unsub = db.collection('farmacia_users').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.logs) setLogs(data.logs);
                        if (data.replenishments) setReplenishments(data.replenishments);
                        if (data.patients) setPatients(data.patients);
                        if (data.pharmacies) setPharmacies(data.pharmacies);
                        if (data.clinics) setClinics(data.clinics);
                        if (data.doctors) setDoctors(data.doctors);
                        setStatus('Nuvem Ativa');
                    } else {
                        setStatus('A criar Nuvem...');
                        db.collection('farmacia_users').doc(user.uid).set({ logs, replenishments, patients, pharmacies, clinics, doctors });
                    }
                }, (error) => {
                    console.error("Erro Firebase:", error);
                    setStatus('Erro Cloud');
                });
                return () => unsub();
            }, [user]);

            const updateCloud = (updates) => {
                if (!user || !db) return;
                const cloudData = {
                    logs: updates.logs || logs,
                    replenishments: updates.replenishments || replenishments,
                    patients: updates.patients || patients,
                    pharmacies: updates.pharmacies || pharmacies,
                    clinics: updates.clinics || clinics,
                    doctors: updates.doctors || doctors
                };
                db.collection('farmacia_users').doc(user.uid).update(cloudData).catch(() => { setStatus('Erro Cloud'); });
            };

            const calculateDaysAgo = (dateStr) => {
                if (!dateStr) return null;
                const today = new Date(getTodayDateStr() + 'T12:00:00');
                const pastDate = new Date(dateStr + 'T12:00:00');
                const diffTime = today - pastDate;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                return diffDays;
            };

            const getEntityStats = (type, name) => {
                const relatedPurchases = replenishments.filter(r => r[type] === name);
                if (relatedPurchases.length === 0) return { daysAgo: null, count: 0 };
                const latestPurchase = relatedPurchases.reduce((latest, current) => {
                    return (new Date(current.date) > new Date(latest.date)) ? current : latest;
                }, relatedPurchases[0]);
                return { daysAgo: calculateDaysAgo(latestPurchase.date), count: relatedPurchases.length };
            };

            const insightData = useMemo(() => {
                const stats = {};
                replenishments.forEach(r => {
                    const name = r[insightTab];
                    if (name) {
                        if (!stats[name]) stats[name] = { count: 0, latestDate: r.date };
                        stats[name].count += 1;
                        if (new Date(r.date) > new Date(stats[name].latestDate)) {
                            stats[name].latestDate = r.date;
                        }
                    }
                });
                
                const dataArray = Object.entries(stats).map(([name, data]) => ({ 
                    name, 
                    count: data.count, 
                    daysAgo: calculateDaysAgo(data.latestDate),
                    latestDate: data.latestDate
                }));

                if (insightMode === 'top') {
                    return dataArray.sort((a, b) => b.count - a.count || a.daysAgo - b.daysAgo).slice(0, 5);
                } else {
                    return dataArray.sort((a, b) => new Date(b.latestDate) - new Date(a.latestDate)).slice(0, 5);
                }
            }, [replenishments, insightTab, insightMode]);

            const stats = useMemo(() => {
                const allEntries = Object.values(logs);
                const totalSaidaGeral = allEntries.reduce((acc, curr) => acc + (Number(curr.d1) || 0) + (Number(curr.d2) || 0) + (Number(curr.d3) || 0), 0);
                const todayStr = getTodayDateStr();
                
                const totalSaidaAteHoje = allEntries.reduce((acc, curr) => {
                    if (curr.data <= todayStr) return acc + (Number(curr.d1) || 0) + (Number(curr.d2) || 0) + (Number(curr.d3) || 0);
                    return acc;
                }, 0);
                
                const totalEntrada = replenishments.reduce((acc, curr) => acc + (Number(curr.amount) || 0), 0);
                const today = new Date(); today.setHours(0,0,0,0);
                const sevenDaysAgo = new Date(today); sevenDaysAgo.setDate(today.getDate() - 6);
                const total7 = allEntries.reduce((acc, curr) => {
                    const dateObj = new Date(curr.data + 'T12:00:00');
                    return (dateObj >= sevenDaysAgo && dateObj <= today) ? acc + (Number(curr.d1) || 0) + (Number(curr.d2) || 0) + (Number(curr.d3) || 0) : acc;
                }, 0);
                return { previsao: estoqueInicialBase + totalEntrada - totalSaidaGeral, estoque: estoqueInicialBase + totalEntrada - totalSaidaAteHoje, total7Dias: total7, totalEntrada };
            }, [logs, replenishments]);

            const chartData = useMemo(() => {
                const data = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(); d.setDate(d.getDate() - i);
                    const ds = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
                    const log = logs[ds] || {};
                    data.push({ name: d.toLocaleDateString('pt-BR', { day: '2-digit' }), Total: (Number(log.d1) || 0) + (Number(log.d2) || 0) + (Number(log.d3) || 0) });
                }
                return data;
            }, [logs]);

            const calendarDays = useMemo(() => {
                const days = [];
                for (let i = -3; i <= 30; i++) {
                    const d = new Date(); d.setDate(d.getDate() + i);
                    const dateStr = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
                    const weekday = new Date(dateStr + 'T12:00:00').toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '').slice(0,3);
                    days.push({ 
                        dateStr, 
                        label: new Date(dateStr + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }), 
                        weekday, 
                        isToday: i === 0,
                        isPast: i < 0
                    });
                }
                return days;
            }, []);

            const daysArr = useMemo(() => calendarDays.map(d => d.dateStr), [calendarDays]);

            const historyItems = useMemo(() => {
                const todayStr = getTodayDateStr();
                const pastLogsWithValue = Object.values(logs).filter(l => 
                    l.data < todayStr && ((Number(l.d1)||0) + (Number(l.d2)||0) + (Number(l.d3)||0)) > 0
                );

                if (pastLogsWithValue.length === 0) return [];
                const oldestLog = pastLogsWithValue.reduce((oldest, current) => current.data < oldest.data ? current : oldest);
                const oldestDateStr = oldestLog.data;
                const items = [];
                let emptyStreak = [];
                let currDate = new Date(todayStr + 'T12:00:00');
                currDate.setDate(currDate.getDate() - 1);
                const oldestDateObj = new Date(oldestDateStr + 'T12:00:00');
                let logCount = 0;

                while (currDate >= oldestDateObj) {
                    const dStr = currDate.toISOString().split('T')[0];
                    const log = logs[dStr] || { d1: '', d2: '', d3: '', data: dStr };
                    const total = (Number(log.d1)||0) + (Number(log.d2)||0) + (Number(log.d3)||0);

                    if (total > 0) {
                        if (emptyStreak.length > 5) {
                            items.push({
                                type: 'empty_group',
                                startDate: emptyStreak[emptyStreak.length - 1].data,
                                endDate: emptyStreak[0].data,
                                count: emptyStreak.length
                            });
                        } else if (emptyStreak.length > 0) {
                            emptyStreak.forEach(emptyLog => items.push({ type: 'log', log: emptyLog, isEditable: logCount < 5 }));
                        }
                        emptyStreak = [];
                        items.push({ type: 'log', log: log, isEditable: logCount < 5 });
                        logCount++;
                    } else {
                        emptyStreak.push(log);
                    }
                    currDate.setDate(currDate.getDate() - 1);
                }

                if (emptyStreak.length > 5) {
                    items.push({
                        type: 'empty_group',
                        startDate: emptyStreak[emptyStreak.length - 1].data,
                        endDate: emptyStreak[0].data,
                        count: emptyStreak.length
                    });
                } else if (emptyStreak.length > 0) {
                    emptyStreak.forEach(emptyLog => items.push({ type: 'log', log: emptyLog, isEditable: logCount < 5 }));
                }

                return items;
            }, [logs]);

            const getTargetList = () => {
                if (manageListType === 'patients') return patients;
                if (manageListType === 'pharmacies') return pharmacies;
                if (manageListType === 'clinics') return clinics;
                return doctors;
            };
            const translateType = (type) => {
                if (type === 'patients') return 'Pacientes';
                if (type === 'pharmacies') return 'Farmácias';
                if (type === 'clinics') return 'Clínicas';
                return 'Médicos';
            };

            const handleSaveListItem = () => {
                if(!manageItemInput.trim()) return;
                const targetList = getTargetList();
                let updatedList;
                if(editingItemId) updatedList = targetList.map(item => item.id === editingItemId ? {...item, name: manageItemInput} : item);
                else updatedList = [...targetList, { id: Date.now(), name: manageItemInput }];

                let updates = {};
                if (manageListType === 'patients') { updates.patients = updatedList; setPatients(updatedList); }
                else if (manageListType === 'pharmacies') { updates.pharmacies = updatedList; setPharmacies(updatedList); }
                else if (manageListType === 'clinics') { updates.clinics = updatedList; setClinics(updatedList); }
                else { updates.doctors = updatedList; setDoctors(updatedList); }

                updateCloud(updates);
                setManageItemInput(''); setEditingItemId(null);
                showToast("Registro salvo com sucesso.");
            };

            const handleQuickAddSave = () => {
                if (!quickAddValue.trim()) return;
                const targetList = quickAdd.listName === 'patients' ? patients : quickAdd.listName === 'pharmacies' ? pharmacies : quickAdd.listName === 'clinics' ? clinics : doctors;
                const newItem = { id: Date.now(), name: quickAddValue };
                const updatedList = [...targetList, newItem];
                
                let updates = {};
                if (quickAdd.listName === 'patients') { updates.patients = updatedList; setPatients(updatedList); setSupplyData({...supplyData, patient: newItem.name}); }
                else if (quickAdd.listName === 'pharmacies') { updates.pharmacies = updatedList; setPharmacies(updatedList); setSupplyData({...supplyData, pharmacy: newItem.name}); }
                else if (quickAdd.listName === 'clinics') { updates.clinics = updatedList; setClinics(updatedList); setSupplyData({...supplyData, clinic: newItem.name}); }
                else { updates.doctors = updatedList; setDoctors(updatedList); setSupplyData({...supplyData, doctor: newItem.name}); }

                updateCloud(updates);
                setQuickAdd(null); setQuickAddValue('');
                showToast("Adicionado com sucesso.");
            };

            const handleInputChange = (dateStr, field, value) => {
                const curr = logs[dateStr] || { d1: '', d2: '', d3: '', data: dateStr };
                const updatedLogs = {...logs, [dateStr]: { ...curr, [field]: value === '' ? '' : Number(value) }};
                setLogs(updatedLogs); updateCloud({ logs: updatedLogs });
            };

            const handleKeyDown = (e, dayIdx, doseIdx) => {
                let nextDay = dayIdx; let nextDose = doseIdx;
                switch (e.key) { case 'ArrowUp': nextDay--; break; case 'ArrowDown': nextDay++; break; case 'ArrowLeft': nextDose--; break; case 'ArrowRight': nextDose++; break; default: return; }
                const nextEl = document.getElementById(`cell-${nextDay}-${nextDose}`);
                if (nextEl) { e.preventDefault(); nextEl.focus(); }
            };
            const handleClearRow = (dateStr) => {
                const updatedLogs = { ...logs }; delete updatedLogs[dateStr]; 
                setLogs(updatedLogs); updateCloud({ logs: updatedLogs });
            };
            const handleInsertRow = (targetDate) => {
                const idx = daysArr.indexOf(targetDate); if (idx === -1) return;
                const newLogs = { ...logs };
                for (let i = daysArr.length - 1; i > idx; i--) {
                    const prevDate = daysArr[i-1]; const currDate = daysArr[i];
                    if (newLogs[prevDate]) newLogs[currDate] = { ...newLogs[prevDate], data: currDate };
                    else delete newLogs[currDate];
                }
                delete newLogs[targetDate]; setLogs(newLogs); updateCloud({ logs: newLogs });
            };
            const handleDeleteRow = (targetDate) => {
                const idx = daysArr.indexOf(targetDate); if (idx === -1) return;
                const newLogs = { ...logs };
                for (let i = idx; i < daysArr.length - 1; i++) {
                    const currDate = daysArr[i]; const nextDate = daysArr[i+1];
                    if (newLogs[nextDate]) newLogs[currDate] = { ...newLogs[nextDate], data: currDate };
                    else delete newLogs[currDate];
                }
                delete newLogs[daysArr[daysArr.length - 1]]; setLogs(newLogs); updateCloud({ logs: newLogs });
            };

            const handleClearAll = () => { 
                const todayStr = getTodayDateStr();
                const newLogs = {};
                Object.keys(logs).forEach(date => {
                    if (date < todayStr) {
                        newLogs[date] = logs[date];
                    }
                });
                setLogs(newLogs); 
                updateCloud({ logs: newLogs }); 
                showToast("Grade de hoje em diante limpa.", "success"); 
            };

            const handleSupply = () => {
                if (!supplyData.amount) { showToast("Por favor, preencha a quantidade.", "error"); return; }
                let updatedReplenishments;
                if (supplyData.id) {
                    updatedReplenishments = replenishments.map(r => r.id === supplyData.id ? { ...r, amount: Number(supplyData.amount), date: supplyData.date, remedio: supplyData.remedio, patient: supplyData.patient, pharmacy: supplyData.pharmacy, clinic: supplyData.clinic, doctor: supplyData.doctor } : r);
                } else {
                    const newReplenishment = { amount: Number(supplyData.amount), date: supplyData.date || getTodayDateStr(), remedio: supplyData.remedio, patient: supplyData.patient, pharmacy: supplyData.pharmacy, clinic: supplyData.clinic, doctor: supplyData.doctor, id: Date.now() };
                    updatedReplenishments = [...replenishments, newReplenishment];
                }
                setReplenishments(updatedReplenishments); updateCloud({ replenishments: updatedReplenishments });
                setShowSupplyModal(false);
                setSupplyData({ id: null, amount: '', date: getTodayDateStr(), remedio: '', patient: '', pharmacy: '', clinic: '', doctor: '' });
                showToast("Compra salva com sucesso!");
            };

            const deletePurchase = (id) => {
                const updated = replenishments.filter(r => r.id !== id);
                setReplenishments(updated); updateCloud({ replenishments: updated }); setSelectedPurchase(null);
                showToast("Compra excluída.", "error");
            };

            const handleEditPurchase = (compra) => { setSupplyData({ id: compra.id, amount: compra.amount, date: compra.date, remedio: compra.remedio || '', patient: compra.patient || '', pharmacy: compra.pharmacy || '', clinic: compra.clinic || '', doctor: compra.doctor || '' }); setSelectedPurchase(null); setShowSupplyModal(true); };

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    if (isRegisterMode) {
                        await auth.createUserWithEmailAndPassword(emailInput, passwordInput);
                        showToast("Conta criada com sucesso!", "success");
                    } else {
                        await auth.signInWithEmailAndPassword(emailInput, passwordInput);
                        showToast("Login realizado com sucesso!", "success");
                    }
                } catch (err) {
                    if(err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') {
                        setAuthError('E-mail ou senha incorretos.');
                    } else if(err.code === 'auth/email-already-in-use') {
                        setAuthError('Este e-mail já está cadastrado.');
                    } else if(err.code === 'auth/weak-password') {
                        setAuthError('A senha deve ter pelo menos 6 caracteres.');
                    } else {
                        setAuthError('Erro na autenticação. Verifique os dados.');
                    }
                }
            };

            const handleGoogleLogin = async () => {
                setAuthError('');
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    await auth.signInWithPopup(provider);
                    showToast("Login com Google realizado!", "success");
                } catch (err) {
                    if (err.code === 'auth/popup-closed-by-user') {
                        // Ignora se o usuário apenas fechou o popup
                        return;
                    }
                    setAuthError('Erro ao entrar com Google. Tente novamente.');
                }
            };

            const handleLogout = () => { auth.signOut(); setEmailInput(''); setPasswordInput(''); };

            const ToastComponent = () => {
                if (!toast) return null;
                const isError = toast.type === 'error';
                return (
                    <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[200] animate-slide-up w-full max-w-xs px-4">
                        <div className={`flex items-center p-4 rounded-2xl shadow-xl border ${isError ? 'bg-rose-50 border-rose-200 text-rose-600' : 'bg-emerald-50 border-emerald-200 text-emerald-600'}`}>
                            {isError ? <IconAlertCircle /> : <IconCheck />}
                            <span className="ml-3 font-bold text-sm leading-tight">{toast.message}</span>
                        </div>
                    </div>
                );
            };

            const handleDeleteListItem = (id) => {
                const targetList = getTargetList();
                const updatedList = targetList.filter(item => item.id !== id);
                let updates = {};
                if (manageListType === 'patients') { updates.patients = updatedList; setPatients(updatedList); }
                else if (manageListType === 'pharmacies') { updates.pharmacies = updatedList; setPharmacies(updatedList); }
                else if (manageListType === 'clinics') { updates.clinics = updatedList; setClinics(updatedList); }
                else { updates.doctors = updatedList; setDoctors(updatedList); }
                updateCloud(updates);
                showToast("Registro removido.", "error");
            };

            const handleBackup = () => {
                const data = JSON.stringify({ logs, replenishments, patients, pharmacies, clinics, doctors });
                const blob = new Blob([data], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup_farmacia_${getTodayDateStr()}.json`; a.click();
                showToast("Backup gerado com sucesso!");
            };

            const handleRestore = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.logs) setLogs(data.logs); if (data.replenishments) setReplenishments(data.replenishments); if (data.patients) setPatients(data.patients); if (data.pharmacies) setPharmacies(data.pharmacies); if (data.clinics) setClinics(data.clinics); if (data.doctors) setDoctors(data.doctors);
                        updateCloud(data);
                        showToast("Backup restaurado! Dados sincronizados.");
                    } catch (err) { showToast("Erro ao ler o arquivo.", "error"); }
                };
                reader.readAsText(file); e.target.value = ''; 
            };

            const handleInstallApp = async () => { if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if (outcome === 'accepted') { setDeferredPrompt(null); } } };

            if (authLoading) {
                return <div className="min-h-screen bg-slate-900 flex items-center justify-center"><div className="w-10 h-10 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div></div>;
            }

            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-6 animate-fade relative">
                        <ToastComponent />
                        <div className="w-full max-w-xs space-y-8">
                            <div className="text-center">
                                <div className="w-16 h-16 bg-emerald-500/10 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_15px_rgba(16,185,129,0.2)]"><IconLock /></div>
                                <h1 className="text-3xl font-black italic tracking-tighter text-white mb-1">FARMÁCIA</h1>
                                <p className="text-[10px] font-black text-emerald-500 uppercase tracking-[0.3em]">{isRegisterMode ? 'Criar Nova Conta' : 'Acesso Restrito'}</p>
                            </div>
                            <form onSubmit={handleAuth} className="space-y-4">
                                <div>
                                    <input type="email" required className={`w-full bg-slate-800 border-2 ${authError ? 'border-rose-500' : 'border-slate-700'} rounded-2xl p-4 text-center text-sm font-bold text-white outline-none focus:border-emerald-500 placeholder:text-slate-500 mb-3`} value={emailInput} onChange={(e) => { setEmailInput(e.target.value); setAuthError(''); }} placeholder="Seu e-mail" />
                                    <input type="password" required className={`w-full bg-slate-800 border-2 ${authError ? 'border-rose-500' : 'border-slate-700'} rounded-2xl p-4 text-center text-lg font-black text-white tracking-[0.2em] outline-none focus:border-emerald-500 placeholder:text-slate-500 placeholder:tracking-normal`} value={passwordInput} onChange={(e) => { setPasswordInput(e.target.value); setAuthError(''); }} placeholder="Sua senha" />
                                    {authError && <p className="text-rose-500 text-[10px] font-bold text-center mt-3 uppercase tracking-widest">{authError}</p>}
                                </div>
                                <button type="submit" className="w-full py-5 bg-emerald-600 text-white text-xs font-black rounded-2xl uppercase tracking-widest shadow-lg shadow-emerald-500/20 active:scale-95 transition-all mt-4">{isRegisterMode ? 'Cadastrar' : 'Entrar'}</button>
                            </form>

                            <div className="relative flex items-center py-2">
                                <div className="flex-grow border-t border-slate-800"></div>
                                <span className="flex-shrink-0 mx-4 text-slate-500 text-[9px] font-bold uppercase tracking-widest">ou</span>
                                <div className="flex-grow border-t border-slate-800"></div>
                            </div>

                            <button type="button" onClick={handleGoogleLogin} className="w-full py-4 bg-white text-slate-800 text-xs font-black rounded-2xl uppercase tracking-widest shadow-lg active:scale-95 transition-all flex items-center justify-center">
                                <span className="mr-3"><IconGoogle /></span> Entrar com Google
                            </button>

                            <div className="text-center mt-6">
                                <button type="button" onClick={() => {setIsRegisterMode(!isRegisterMode); setAuthError('');}} className="text-[10px] font-bold text-slate-400 hover:text-white transition-colors uppercase tracking-widest">
                                    {isRegisterMode ? 'Já tenho uma conta' : 'Criar uma conta por e-mail'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <ToastComponent />
                    <header className="bg-slate-900 text-white pt-8 pb-10 px-6 rounded-b-[3.5rem] shadow-2xl sticky top-0 z-40 border-b-4 border-emerald-500">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-4xl font-black italic tracking-tighter leading-none mb-1">FARMÁCIA</h1>
                                <div className="flex items-center space-x-1">
                                    <span className={`transition-colors ${status === 'Erro Cloud' ? 'text-rose-500 animate-pulse' : 'text-emerald-500 ' + (status === 'Nuvem Ativa' ? 'animate-pulse' : '')}`}><IconCloud /></span>
                                    <p className={`text-[9px] font-black uppercase tracking-[0.2em] transition-colors ${status === 'Erro Cloud' ? 'text-rose-500' : 'text-emerald-500'}`}>Controle de Doses</p>
                                    <button onClick={() => setShowSettings(true)} className="ml-2 p-1 text-slate-500 hover:text-white transition-colors"><IconSettings /></button>
                                    <button onClick={handleLogout} className="ml-1 p-1 text-slate-500 hover:text-white transition-colors" title="Bloquear App"><IconLock /></button>
                                </div>
                            </div>
                            <div className={`p-3 px-5 rounded-[2rem] border-2 backdrop-blur-md transition-all ${stats.previsao < 0 ? 'bg-rose-500/10 border-rose-500 text-rose-400' : 'bg-emerald-500/10 border-emerald-500 text-emerald-400'}`}>
                                <span className="block text-[8px] font-black uppercase text-center opacity-60">Previsão</span>
                                <span className="text-3xl font-black leading-none">{stats.previsao}</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto px-4 -mt-4 relative z-10 flex-1 w-full pb-32">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-4 pt-2 animate-fade">
                                <div className="bg-white p-4 rounded-[2.5rem] shadow-sm border border-slate-100 mb-4">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-2">Cadastros ERP</h3>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={() => setManageListType('patients')} className="py-3 bg-slate-50 border border-slate-100 text-slate-700 rounded-2xl text-[9px] font-black uppercase tracking-widest flex items-center justify-center hover:bg-indigo-50 hover:border-indigo-100 hover:text-indigo-600 transition-colors"><span className="mr-2"><IconUser /></span> Pacientes</button>
                                        <button onClick={() => setManageListType('pharmacies')} className="py-3 bg-slate-50 border border-slate-100 text-slate-700 rounded-2xl text-[9px] font-black uppercase tracking-widest flex items-center justify-center hover:bg-emerald-50 hover:border-emerald-100 hover:text-emerald-600 transition-colors"><span className="mr-2"><IconBuilding /></span> Farmácias</button>
                                        <button onClick={() => setManageListType('clinics')} className="py-3 bg-slate-50 border border-slate-100 text-slate-700 rounded-2xl text-[9px] font-black uppercase tracking-widest flex items-center justify-center hover:bg-blue-50 hover:border-blue-100 hover:text-blue-600 transition-colors"><span className="mr-2"><IconHospital /></span> Clínicas</button>
                                        <button onClick={() => setManageListType('doctors')} className="py-3 bg-slate-50 border border-slate-100 text-slate-700 rounded-2xl text-[9px] font-black uppercase tracking-widest flex items-center justify-center hover:bg-rose-50 hover:border-rose-100 hover:text-rose-600 transition-colors"><span className="mr-2"><IconHeartBeat /></span> Médicos</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col justify-between aspect-square">
                                        <p className="text-slate-400 text-[10px] font-black uppercase">Últimos 7 Dias</p>

                                <div className="flex space-x-2 mb-6 shrink-0 items-center">
                                    <input type="text" placeholder={`Adicionar ${translateType(manageListType).toLowerCase().replace('s', '')}...`} className="flex-1 font-bold bg-slate-50 border border-slate-100 rounded-2xl p-4 text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400 h-14" value={manageItemInput} onFocus={onInputFocus} onBlur={onInputBlur} onChange={e => setManageItemInput(e.target.value)} />
                                    <button onClick={handleSaveListItem} className="bg-indigo-600 text-white rounded-2xl w-14 h-14 flex items-center justify-center font-black shadow-lg active:scale-95 transition-all shrink-0">{editingItemId ? <IconCheck /> : <IconPlus />}</button>
                                </div>
                                <div className="space-y-3 overflow-y-auto flex-1 pr-2 scrollbar-hide pb-4 min-h-[30vh]">
                                    {getTargetList().map(item => {
                                        const dbType = manageListType === 'patients' ? 'patient' : manageListType === 'pharmacies' ? 'pharmacy' : manageListType === 'clinics' ? 'clinic' : 'doctor';
                                        const stat = getEntityStats(dbType, item.name);
                                        return (
                                            <div key={item.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                <div className="flex-1 min-w-0 mr-2">
                                                    <span className="font-bold text-sm text-slate-800 truncate block">{item.name}</span>
                                                    <div className="mt-1">{stat.daysAgo !== null ? (<span className={`text-[8px] font-black uppercase px-2 py-0.5 rounded-full ${stat.daysAgo === 0 ? 'bg-emerald-100 text-emerald-600' : 'bg-indigo-100 text-indigo-600'}`}>{stat.daysAgo === 0 ? 'Hoje' : `Há ${stat.daysAgo} dias`}</span>) : (<span className="text-[8px] font-black uppercase px-2 py-0.5 rounded-full bg-slate-200 text-slate-500">Nunca</span>)}</div>
                                                </div>
                                                <div className="flex space-x-1 shrink-0">
                                                    <button onClick={() => { setEditingItemId(item.id); setManageItemInput(item.name); }} className="p-2 text-indigo-400 hover:text-indigo-600 bg-indigo-50 rounded-xl transition-colors"><IconPencil /></button>
                                                    <button onClick={() => handleDeleteListItem(item.id)} className="p-2 text-rose-400 hover:text-rose-600 bg-rose-50 rounded-xl transition-colors"><IconTrash /></button>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {showSupplyModal && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-6 bg-slate-900/90 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-t-[3rem] sm:rounded-[3rem] p-8 shadow-2xl border-t-8 border-emerald-500 max-h-[90vh] overflow-y-auto animate-fade">
                                <h2 className="text-xl font-black text-center italic mb-6 uppercase text-slate-800">{supplyData.id ? 'Editar Compra' : 'Nova Compra'}</h2>
                                <div className="space-y-4 mb-8">
                                    <div className="bg-emerald-50/50 p-4 rounded-3xl border border-emerald-100">
                                        <label className="text-[10px] font-black text-emerald-600 uppercase tracking-widest ml-2 block mb-2">Quantidade (Cápsulas)*</label>
                                        <input type="number" placeholder="0" className="w-full text-4xl font-black text-center bg-transparent border-none text-emerald-600 outline-none placeholder:text-emerald-200" value={supplyData.amount} onFocus={onInputFocus} onBlur={onInputBlur} onChange={e=>setSupplyData({...supplyData, amount: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 block mb-1">Data da Compra</label>
                                        <input type="date" className="w-full font-bold bg-slate-50 border border-slate-100 rounded-2xl p-4 text-slate-700 outline-none focus:ring-2 focus:ring-emerald-400" value={supplyData.date} onFocus={onInputFocus} onBlur={onInputBlur} onChange={e=>setSupplyData({...supplyData, date: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 block mb-1">Remédio</label>
                                        <input type="text" placeholder="Ex: Medicamento X" className="w-full font-bold bg-slate-50 border border-slate-100 rounded-2xl p-4 text-slate-700 outline-none focus:ring-2 focus:ring-emerald-400" value={supplyData.remedio} onFocus={onInputFocus} onBlur={onInputBlur} onChange={e=>setSupplyData({...supplyData, remedio: e.target.value})} />
                                    </div>
                                    <div>
                                        <div className="flex justify-between items-end mb-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 block">Paciente</label>
                                            <button onClick={() => setQuickAdd({ label: 'Paciente', listName: 'patients' })} className="text-emerald-600 bg-emerald-50 p-1 rounded-md text-[10px] font-black flex items-center hover:bg-emerald-100 transition-colors"><IconPlus /><span className="ml-1">Novo</span></button>
                                        </div>
                                        <select className="w-full font-bold bg-slate-50 border border-slate-100 rounded-2xl p-4 text-slate-700 outline-none focus:ring-2 focus:ring-emerald-400" value={supplyData.patient} onChange={e=>setSupplyData({...supplyData, patient: e.target.value})}>
                                            <option value="">Selecione ou adicione novo...</option>
                                            {patients.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <div className="flex justify-between items-end mb-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 block">Farmácia</label>
                                            <button onClick={() => setQuickAdd({ label: 'Farmácia', listName: 'pharmacies' })} className="text-emerald-600 bg-emerald-50 p-1 rounded-md text-[10px] font-black flex items-center hover:bg-emerald-100 transition-colors"><IconPlus /><span className="ml-1">Nova</span></button>
                                        </div>
                                        <select className="w-full font-bold bg-slate-50 border border-slate-100 rounded-2xl p-4 text-slate-700 outline-none focus:ring-2 focus:ring-emerald-400" value={supplyData.pharmacy} onChange={e=>setSupplyData({...supplyData, pharmacy: e.target.value})}>
                                            <option value="">Selecione ou adicione nova...</option>
                                            {pharmacies.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <div className="flex justify-between items-end mb-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 block">Clínica</label>
                                            <button onClick={() => setQuickAdd({ label: 'Clínica', listName: 'clinics' })} className="text-emerald-600 bg-emerald-50 p-1 rounded-md text-[10px] font-black flex items-center hover:bg-emerald-100 transition-colors"><IconPlus /><span className="ml-1">Nova</span></button>
                                        </div>
                                        <select className="w-full font-bold bg-slate-50 border border-slate-100 rounded-2xl p-4 text-slate-700 outline-none focus:ring-2 focus:ring-emerald-400" value={supplyData.clinic} onChange={e=>setSupplyData({...supplyData, clinic: e.target.value})}>
                                            <option value="">Selecione ou adicione nova...</option>
                                            {clinics.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <div className="flex justify-between items-end mb-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 block">Médico</label>
                                            <button onClick={() => setQuickAdd({ label: 'Médico', listName: 'doctors' })} className="text-emerald-600 bg-emerald-50 p-1 rounded-md text-[10px] font-black flex items-center hover:bg-emerald-100 transition-colors"><IconPlus /><span className="ml-1">Novo</span></button>
                                        </div>
                                        <select className="w-full font-bold bg-slate-50 border border-slate-100 rounded-2xl p-4 text-slate-700 outline-none focus:ring-2 focus:ring-emerald-400" value={supplyData.doctor} onChange={e=>setSupplyData({...supplyData, doctor: e.target.value})}>
                                            <option value="">Selecione ou adicione novo...</option>
                                            {doctors.map(d => <option key={d.id} value={d.name}>{d.name}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div className="flex space-x-3">
                                    <button onClick={()=>setShowSupplyModal(false)} className="flex-1 py-4 text-xs font-black text-slate-400 uppercase bg-slate-100 rounded-2xl active:scale-95 transition-all">Cancelar</button>
                                    <button onClick={handleSupply} className="flex-[2] py-4 bg-emerald-600 text-white text-xs font-black rounded-2xl uppercase shadow-lg shadow-emerald-500/30 active:scale-95 transition-all">Salvar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {quickAdd && (
                        <div className="fixed inset-0 z-[130] flex items-end sm:items-center justify-center p-0 sm:p-6 bg-slate-900/90 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-t-[3rem] sm:rounded-[3rem] p-8 shadow-2xl border-t-8 border-indigo-500 animate-slide-up">
                                <h2 className="text-xl font-black text-center italic mb-6 uppercase text-slate-800">Novo(a) {quickAdd.label}</h2>
                                <div className="space-y-4 mb-8">
                                    <input type="text" placeholder={`Nome do(a) ${quickAdd.label}...`} autoFocus className="w-full font-bold bg-slate-50 border border-slate-100 rounded-2xl p-4 text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400" value={quickAddValue} onFocus={onInputFocus} onBlur={onInputBlur} onChange={e=>setQuickAddValue(e.target.value)} />
                                </div>
                                <div className="flex space-x-3">
                                    <button onClick={()=>{setQuickAdd(null); setQuickAddValue('');}} className="flex-1 py-4 text-xs font-black text-slate-400 uppercase bg-slate-100 rounded-2xl active:scale-95 transition-all">Cancelar</button>
                                    <button onClick={handleQuickAddSave} className="flex-[2] py-4 bg-indigo-600 text-white text-xs font-black rounded-2xl uppercase shadow-lg shadow-indigo-500/30 active:scale-95 transition-all">Adicionar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {selectedPurchase && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl border-t-8 border-emerald-500 animate-fade">
                                <div className="flex justify-between items-start mb-6">
                                    <h2 className="text-xl font-black italic uppercase text-slate-800">Detalhes da Compra</h2>
                                    <button onClick={() => setSelectedPurchase(null)} className="text-slate-400 hover:text-slate-600 p-2"><IconX /></button>
                                </div>
                                
                                <div className="space-y-4 mb-8 bg-slate-50 p-6 rounded-3xl border border-slate-100 text-center">
                                    <p className="text-2xl font-black text-emerald-600 mb-4">{selectedPurchase.amount} Cápsulas</p>

                                    <div className="grid grid-cols-2 gap-4 text-left border-t border-slate-200 border-dashed pt-4">
                                        <div>
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Data</p>
                                            <p className="text-sm font-bold text-slate-800">{new Date(selectedPurchase.date + 'T12:00:00').toLocaleDateString('pt-BR')}</p>
                                        </div>
                                        <div>
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Remédio</p>
                                            <p className="text-sm font-bold text-slate-800">{selectedPurchase.remedio || 'Não informado'}</p>
                                        </div>
                                        <div className="col-span-2">
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Paciente</p>
                                            <p className="text-sm font-bold text-slate-800">{selectedPurchase.patient || 'Não informado'}</p>
                                        </div>
                                        <div className="col-span-2">
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Farmácia</p>
                                            <p className="text-sm font-bold text-slate-800">{selectedPurchase.pharmacy || 'Não informada'}</p>
                                        </div>
                                        <div className="col-span-2">
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Clínica</p>
                                            <p className="text-sm font-bold text-slate-800">{selectedPurchase.clinic || 'Não informada'}</p>
                                        </div>
                                        <div className="col-span-2">
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Médico</p>
                                            <p className="text-sm font-bold text-slate-800">{selectedPurchase.doctor || 'Não informado'}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex space-x-3">
                                    <button onClick={() => deletePurchase(selectedPurchase.id)} className="flex-1 py-4 bg-rose-50 text-rose-600 text-xs font-black rounded-2xl uppercase flex items-center justify-center active:scale-95 transition-all"><span className="mr-2"><IconTrash /></span> Excluir</button>
                                    <button onClick={() => handleEditPurchase(selectedPurchase)} className="flex-1 py-4 bg-slate-900 text-white text-xs font-black rounded-2xl uppercase flex items-center justify-center active:scale-95 transition-all"><span className="mr-2"><IconPencil /></span> Editar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isKeyboardVisible && !forceShowNav && isMobileDevice() && (
                        <div 
                            className="fixed bottom-0 left-0 right-0 h-16 z-[45]" 
                            onClick={() => setForceShowNav(true)}
                        ></div>
                    )}

                    <nav className={`fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-2xl border-t border-slate-100 flex justify-between items-center py-2 px-4 sm:px-6 pb-10 shadow-2xl z-40 transition-transform duration-500 ${(isKeyboardVisible && !forceShowNav) ? 'translate-y-full opacity-0 pointer-events-none' : 'translate-y-0 opacity-100'}`}>
                        <button onClick={()=>setActiveTab('dashboard')} className={`flex flex-col items-center p-2 sm:p-3 rounded-2xl sm:rounded-3xl transition-all ${activeTab === 'dashboard' ? 'tab-active' : 'text-slate-400'}`}><IconHome /><span className="text-[8px] sm:text-[9px] mt-1 uppercase">Início</span></button>
                        <button onClick={()=>setActiveTab('agenda')} className={`flex flex-col items-center p-2 sm:p-3 rounded-2xl sm:rounded-3xl transition-all ${activeTab === 'agenda' ? 'tab-active' : 'text-slate-400'}`}><IconTable /><span className="text-[8px] sm:text-[9px] mt-1 uppercase">Lançar</span></button>
                        <button onClick={()=>setActiveTab('history')} className={`flex flex-col items-center p-2 sm:p-3 rounded-2xl sm:rounded-3xl transition-all ${activeTab === 'history' ? 'tab-active' : 'text-slate-400'}`}><IconHistory /><span className="text-[8px] sm:text-[9px] mt-1 uppercase">Passadas</span></button>
                        <button onClick={()=>setActiveTab('purchases')} className={`flex flex-col items-center p-2 sm:p-3 rounded-2xl sm:rounded-3xl transition-all ${activeTab === 'purchases' ? 'tab-active' : 'text-slate-400'}`}><IconBag /><span className="text-[8px] sm:text-[9px] mt-1 uppercase">Compras</span></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
