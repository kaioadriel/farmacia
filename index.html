        const formatCurrency = (value) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);
        };

        const maskCurrency = (v) => {
            if (!v) return "";
            v = String(v).replace(/\D/g, "");
            if (v === "") return "";
            v = (parseInt(v, 10) / 100).toFixed(2);
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
            return v;
        };

        const parseCurrency = (v) => {
            if (!v) return 0;
            return parseFloat(String(v).replace(/\./g, "").replace(",", "."));
        };

        const maskCPF = (v) => v.replace(/\D/g, '').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2').slice(0, 14);
        const maskRG = (v) => v.replace(/\D/g, '').replace(/(\d{2})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1})$/, '$1-$2').slice(0, 12);
        const maskPhone = (v) => v.replace(/\D/g, '').replace(/(\d{2})(\d)/, '($1) $2').replace(/(\d{5})(\d{4})$/, '$1.$2').slice(0, 15);
        const maskCEP = (v) => v.replace(/\D/g, '').replace(/(\d{5})(\d{3})$/, '$1-$2').slice(0, 9);

        const getAge = (dateString) => {
            if (!dateString) return '';
            const today = new Date();
            const birthDate = new Date(dateString + 'T12:00:00');
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) { age--; }
            return age;
        };

            const calculateDaysAgo = (dateStr) => {
                if (!dateStr) return null;
                const today = new Date(getTodayDateStr() + 'T12:00:00');
                const pastDate = new Date(dateStr + 'T12:00:00');
                const diffTime = today - pastDate;
                return Math.floor(diffTime / (1000 * 60 * 60 * 24));
            };

                 if (!name) return { daysAgo: null, text: "Sem compras" };
                 const purchases = replenishments.filter(r => r[entityType] === name && r.statusCompra !== 'Pendente');
                 if (purchases.length === 0) return { daysAgo: null, text: "Sem compras" };
                 const latest = purchases.reduce((a, b) => new Date(a.date) > new Date(b.date) ? a : b);
                 const days = calculateDaysAgo(latest.date);
                 let text = `Há ${days} dias`;
                 if (days === 0) text = "Hoje";
                 if (days === 1) text = "Ontem";
                 return { daysAgo: days, text };
            };

                return [...list].sort((a, b) => {

                    const daysB = getLastPurchaseData(type, b.name).daysAgo;
                    if (daysA === null && daysB === null) return 0;
                    if (daysA === null) return 1;
                    if (daysB === null) return -1;
                    return daysA - daysB;
                });
            };

                const stats = {};

                validPurchases.forEach(r => {
                    let typeMap = { 'medicamento': 'medicamento', 'pharmacy': 'pharmacy', 'patient': 'patient', 'clinic': 'clinic', 'doctor': 'doctor' };
                    const name = r[typeMap[insightTab]];
                    if (name) {
                        if (!stats[name]) stats[name] = { count: 0, latestDate: r.date };
                        stats[name].count += 1;
                        if (new Date(r.date) > new Date(stats[name].latestDate)) { stats[name].latestDate = r.date; }
                    }
                });
                
                const dataArray = Object.entries(stats).map(([name, data]) => ({ 
                    name, count: data.count, daysAgo: calculateDaysAgo(data.latestDate), latestDate: data.latestDate
                }));

                if (insightMode === 'top') {
                    const oneYearAgo = new Date(); oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
                    return dataArray.filter(d => new Date(d.latestDate) >= oneYearAgo).sort((a, b) => b.count - a.count || a.daysAgo - b.daysAgo).slice(0, 5);

                        const canvas = document.createElement('canvas');
                        const MAX = 800; let w = img.width; let h = img.height;
                        if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } } else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                        canvas.width = w; canvas.height = h; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);

                    await auth.signInWithPopup(provider); showToast("Login com o Google realizado!");
                } catch (err) {
                    if (err.code === 'auth/popup-closed-by-user') return; 
                    if (err.code === 'auth/operation-not-supported-in-this-environment') { setAuthError('O login com Google não é suportado na pré-visualização. Acesse pelo domínio oficial.'); return; }

            const handleLogout = () => { if(auth) auth.signOut(); setEmailInput(''); setPasswordInput(''); };

            const handleBackup = () => {
                const data = JSON.stringify({ replenishments, patients, pharmacies, clinics, doctors, medicaments });
                const blob = new Blob([data], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup_compras_farmacia_${getTodayDateStr()}.json`; a.click();
                showToast("Cópia de segurança criada com sucesso!");

            const handleGeneratePDF = () => {
                let iframe = document.getElementById('print-iframe');
                if (!iframe) { iframe = document.createElement('iframe'); iframe.id = 'print-iframe'; iframe.style.display = 'none'; document.body.appendChild(iframe); }
                const makeTable = (title, headers, rows) => {
                    if(rows.length === 0) return `<p>Nenhum registro em ${title}.</p>`;
                    let t = `<h2 style="color: #0f172a; border-bottom: 2px solid #0f172a; padding-bottom: 5px;">${title}</h2><table style="width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 12px; font-family: sans-serif;"><thead><tr>`;
                    headers.forEach(h => t += `<th style="border: 1px solid #cbd5e1; padding: 8px; background-color: #f1f5f9; text-align: left;">${h}</th>`);
                    t += `</tr></thead><tbody>`;
                    rows.forEach(r => { t += `<tr>`; r.forEach(cell => t += `<td style="border: 1px solid #cbd5e1; padding: 8px;">${cell || '-'}</td>`); t += `</tr>`; });
                    t += `</tbody></table>`;
                    return t;
                };
                let html = `<html><head><title>Relatório Farmácia</title></head><body style="font-family: Arial, sans-serif; padding: 20px; color: #334155;"><h1 style="text-align: center; color: #0f172a;">RELATÓRIO COMPLETO - CONTROLE DE RECEITAS</h1><p style="text-align: center; margin-bottom: 40px;">Gerado em: ${new Date().toLocaleString('pt-BR')}</p>`;
                html += makeTable("Compras Realizadas", ["Data", "Status", "Medicamento", "Qtd", "Valor", "Paciente", "Farmácia", "Clínica", "Médico", "Pagamento"], replenishments.map(r => [new Date(r.date + 'T12:00:00').toLocaleDateString('pt-BR'), r.statusCompra || 'Confirmado', r.medicamento, r.amount, formatCurrency(r.valor), r.patient, r.pharmacy, r.clinic, r.doctor, r.pagamento]));
                html += makeTable("Pacientes", ["Nome", "Status", "CPF", "RG", "Telefone", "E-mail", "CEP", "Cidade/UF"], patients.map(p => [p.name, p.status || 'Ativo', p.cpf, p.rg, p.phone, p.email, p.cep, p.cidade ? `${p.cidade}/${p.estado}` : '']));
                html += makeTable("Farmácias", ["Nome", "Status", "Telefone", "CEP", "Cidade/UF"], pharmacies.map(p => [p.name, p.status || 'Ativo', p.telefone, p.cep, p.cidade ? `${p.cidade}/${p.estado}` : '']));
                html += makeTable("Clínicas", ["Nome", "Status", "Especialidade", "Responsável", "Telefone", "CEP"], clinics.map(c => [c.name, c.status || 'Ativo', c.especialidade, c.medicoResponsavel, c.telefone, c.cep]));
                html += makeTable("Médicos", ["Nome", "Status Reg.", "Status CRM", "Especialidade", "CRM/UF", "RQE"], doctors.map(d => [d.name, d.status || 'Ativo', d.status || 'Ativo', d.especialidade, d.crm ? `${d.crm}/${d.uf}` : '', d.rqe]));
                html += makeTable("Medicamentos", ["Nome", "Status", "Dosagens", "Tipo", "Observações"], medicaments.map(m => [m.name, m.status || 'Ativo', m.dosagens, m.tipo, m.observacoes]));
                html += `</body></html>`;
                const doc = iframe.contentWindow.document; doc.open(); doc.write(html); doc.close();
                setTimeout(() => { iframe.contentWindow.focus(); iframe.contentWindow.print(); }, 500);
            };

            const getTitleForTab = (tab) => {
                if (tab === 'patients') return 'Registro de Pacientes';

                if (tab === 'clinics') return 'Registro de Clínicas';
                if (tab === 'doctors') return 'Registro de Médicos';
                if (tab === 'medicaments') return 'Registro de Medicamentos';
                return '';

            const getEntityKeyForPurchase = (tab) => {

                if (tab === 'pharmacies') return 'pharmacy';
                if (tab === 'clinics') return 'clinic';
                if (tab === 'doctors') return 'doctor';
                if (tab === 'medicaments') return 'medicamento';
                return '';

            const renderEntityList = (tabName, list) => {
                const entityKey = getEntityKeyForPurchase(tabName);
                const filteredList = list.filter(item => item.name.toLowerCase().includes(searchTerm.toLowerCase()));

                                <div className="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400"><IconSearch /></div>

                            </div>
                        </div>
                        <div className="space-y-3 pb-10">
                            {sortedList.map(item => {
                                const daysText = getLastPurchaseData(entityKey, item.name).text;

                                            {tabName === 'doctors' && <p className="text-[10px] text-slate-500 font-bold mt-1 truncate">{item.especialidade || 'S/ Especialidade'} | CRM: {item.crm || '-'}</p>}
                                            {tabName === 'medicaments' && <p className="text-[10px] text-slate-500 font-bold mt-1 truncate">{item.tipo || 'S/ Tipo'} | {item.dosagens || '-'}</p>}
                                            <div className="mt-2 flex gap-1">{missing && <span className="bg-orange-100 text-orange-600 px-2 py-0.5 rounded-md text-[8px] font-black uppercase">Falta preencher</span>}{isInactive && <span className="bg-rose-500 text-white px-2 py-0.5 rounded-md text-[8px] font-black uppercase">Inativo</span>}</div>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedEntity(item)} className={`px-3 py-2 shrink-0 rounded-xl text-[10px] font-black uppercase active:scale-95 transition-all ml-2 ${isInactive ? 'bg-rose-100 text-rose-700 hover:bg-rose-200' : 'bg-teal-50 text-teal-700 hover:bg-teal-100'}`}>Ver Mais</button>
                                </div>
                            )})}
                            {sortedList.length === 0 && <div className="text-center py-10 text-slate-400 text-xs font-bold">Nenhum registro encontrado.</div>}
                        </div>
                    </div>
                );
            };

            if (authLoading) return <div className="min-h-screen bg-slate-50 flex items-center justify-center"><div className="w-10 h-10 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 animate-fade relative">
                        <ToastComponent />
                        <div className="w-full max-w-xs space-y-8 bg-white p-8 rounded-3xl shadow-xl border border-slate-100">

                                <div className="w-16 h-16 bg-teal-50 text-teal-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm border border-teal-100"><IconLockStatic /></div>

                                <button type="submit" className="w-full py-5 bg-teal-600 text-white text-xs font-black rounded-2xl uppercase tracking-widest shadow-lg shadow-teal-500/20 active:scale-95 transition-all mt-4">{isRegisterMode ? 'Cadastrar' : 'Entrar'}</button>
                            </form>
                            <div className="relative flex items-center py-2"><div className="flex-grow border-t border-slate-100"></div><span className="flex-shrink-0 mx-4 text-slate-400 text-[9px] font-bold uppercase tracking-widest">ou</span><div className="flex-grow border-t border-slate-100"></div></div>
                            <button type="button" onClick={handleGoogleLogin} className="w-full py-4 bg-slate-50 border border-slate-200 text-slate-700 text-xs font-black rounded-2xl uppercase tracking-widest shadow-sm active:scale-95 transition-all flex items-center justify-center hover:bg-slate-100"><span className="mr-3"><IconGoogle /></span> Google</button>
                            <div className="text-center mt-6"><button type="button" onClick={() => {setIsRegisterMode(!isRegisterMode); setAuthError('');}} className="text-[10px] font-bold text-slate-500 hover:text-teal-600 transition-colors uppercase tracking-widest">{isRegisterMode ? 'Já tenho uma conta' : 'Criar uma conta por e-mail'}</button></div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <ToastComponent />
                    {isMenuOpen && (<div className="fixed inset-0 z-[140] bg-slate-900/20 backdrop-blur-sm transition-opacity" onClick={() => setIsMenuOpen(false)}></div>)}
                    <div className={`fixed top-0 right-0 bottom-0 w-72 bg-white z-[150] shadow-2xl transform transition-transform duration-300 ease-in-out flex flex-col ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="p-6 flex justify-between items-center border-b border-slate-100 bg-slate-50"><h2 className="text-lg font-black text-slate-700 uppercase tracking-widest">Menu</h2><button onClick={() => setIsMenuOpen(false)} className="p-2 text-slate-400 hover:text-rose-500 transition-colors"><IconX /></button></div>
                        <div className="p-4 flex-1 overflow-y-auto space-y-2 scrollbar-hide"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-2 mt-2">Cadastros ERP</p><button onClick={() => { setActiveTab('pharmacies'); setIsMenuOpen(false); }} className={`w-full flex items-center p-4 rounded-2xl transition-all ${activeTab === 'pharmacies' ? 'bg-teal-50 text-teal-700' : 'hover:bg-slate-50 text-slate-600'}`}><IconBuilding /><span className="ml-3 font-bold text-sm">Farmácias</span></button><button onClick={() => { setActiveTab('clinics'); setIsMenuOpen(false); }} className={`w-full flex items-center p-4 rounded-2xl transition-all ${activeTab === 'clinics' ? 'bg-teal-50 text-teal-700' : 'hover:bg-slate-50 text-slate-600'}`}><IconHospital /><span className="ml-3 font-bold text-sm">Clínicas</span></button><button onClick={() => { setActiveTab('doctors'); setIsMenuOpen(false); }} className={`w-full flex items-center p-4 rounded-2xl transition-all ${activeTab === 'doctors' ? 'bg-teal-50 text-teal-700' : 'hover:bg-slate-50 text-slate-600'}`}><IconHeartBeat /><span className="ml-3 font-bold text-sm">Médicos</span></button><button onClick={() => { setActiveTab('medicaments'); setIsMenuOpen(false); }} className={`w-full flex items-center p-4 rounded-2xl transition-all ${activeTab === 'medicaments' ? 'bg-teal-50 text-teal-700' : 'hover:bg-slate-50 text-slate-600'}`}><IconPill /><span className="ml-3 font-bold text-sm">Remédios</span></button><div className="my-6 border-t border-slate-100"></div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-2">Sistema</p><button onClick={() => { handleGeneratePDF(); setIsMenuOpen(false); }} className="w-full flex items-center p-4 rounded-2xl hover:bg-slate-50 text-slate-600 transition-all"><IconFileText /><span className="ml-3 font-bold text-sm">Gerar PDF</span></button><button onClick={() => { handleBackup(); setIsMenuOpen(false); }} className="w-full flex items-center p-4 rounded-2xl hover:bg-slate-50 text-slate-600 transition-all"><IconDownload /><span className="ml-3 font-bold text-sm">Fazer Backup</span></button><button onClick={() => { fileInputRef.current.click(); setIsMenuOpen(false); }} className="w-full flex items-center p-4 rounded-2xl hover:bg-slate-50 text-slate-600 transition-all"><IconUpload /><span className="ml-3 font-bold text-sm">Restaurar Dados</span></button></div>
                    </div>
                    {viewingImage && (<div className="fixed inset-0 z-[200] bg-black/90 flex flex-col items-center justify-center animate-fade"><div className="absolute top-6 right-6"><button onClick={() => setViewingImage(null)} className="text-white p-2 hover:bg-white/20 rounded-full transition-colors"><IconX /></button></div><img src={viewingImage} alt="Documento" className="max-w-[95%] max-h-[85vh] rounded-lg shadow-2xl" /></div>)}
                    <header className="bg-white text-slate-800 pt-8 pb-6 px-6 rounded-b-[2.5rem] shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] sticky top-0 z-40 border-b border-slate-100"><div className="max-w-md mx-auto relative flex flex-col items-center justify-center"><h1 className="text-3xl font-black italic tracking-tighter leading-none mb-1 text-center text-teal-600">FARMÁCIA</h1><div className="flex items-center space-x-1 justify-center"><span className={`transition-colors ${status === 'Erro Cloud' ? 'text-rose-400 animate-pulse' : 'text-teal-400 ' + (status === 'Nuvem Ativa' ? 'animate-pulse' : '')}`}><IconCloud /></span><p className={`text-[9px] font-black uppercase tracking-[0.2em] transition-colors ${status === 'Erro Cloud' ? 'text-rose-400' : 'text-slate-400'}`}>Controle de Receitas</p></div><div className="absolute right-0 top-1/2 -translate-y-1/2 flex space-x-1"><button onClick={handleLogout} className="p-2 text-rose-400 hover:text-rose-500 transition-colors bg-rose-50 rounded-full" title="Sair"><IconLogout /></button></div></div></header>
                    <main className="max-w-md mx-auto px-4 -mt-4 relative z-10 flex-1 w-full pb-24">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-4 pt-2 animate-fade">
                                <div className="text-center mt-6 mb-8"><p className="text-xs font-black text-slate-500 uppercase tracking-widest">{getGreeting()}</p></div>
                                <button onClick={() => { setSupplyData({ id: null, date: getTodayDateStr(), medicamento: '', amount: '', patient: '', pharmacy: '', clinic: '', doctor: '', pagamento: '', valorString: '', observacoes: '', statusCompra: 'Confirmado' }); setShowSupplyModal(true); }} className="w-full bg-teal-500 text-white py-5 rounded-3xl text-sm font-black uppercase tracking-widest flex items-center justify-center shadow-[0_8px_25px_-8px_rgba(20,184,166,0.5)] active:scale-95 transition-all mb-6"><span className="mr-2"><IconPlus /></span> REGISTRAR COMPRA</button>
                                <div className="bg-slate-50 border border-slate-200 p-6 rounded-[2.5rem] shadow-sm text-slate-800 mb-4 relative overflow-hidden">
                                    <div className="flex justify-between items-center mb-5 relative z-10"><h3 className="text-[10px] font-black text-teal-600 uppercase tracking-widest flex items-center"><IconTrophy /><span className="ml-2">{insightMode === 'top' ? 'Top 5 (12 Meses)' : 'Mais Recentes'}</span></h3><div className="flex bg-white rounded-lg p-0.5 border border-slate-200 shadow-sm"><button onClick={() => setInsightMode('top')} className={`px-2 py-1 text-[8px] font-black uppercase rounded-md transition-all ${insightMode === 'top' ? 'bg-slate-100 text-slate-800' : 'text-slate-400'}`}>Top</button><button onClick={() => setInsightMode('recent')} className={`px-2 py-1 text-[8px] font-black uppercase rounded-md transition-all ${insightMode === 'recent' ? 'bg-slate-100 text-slate-800' : 'text-slate-400'}`}>Recentes</button></div></div>
                                    
                                    {/* ABAS DO DASHBOARD EM UMA LINHA E SEM ABREVIAÇÕES */}
                                    <div className="flex justify-start gap-1 bg-white p-1 rounded-xl mb-4 relative z-10 w-full overflow-x-auto scrollbar-hide shadow-sm border border-slate-100 flex-nowrap">
                                        <button onClick={() => setInsightTab('patient')} className={`px-3 py-2 text-[7px] sm:text-[8px] font-black uppercase rounded-lg transition-all whitespace-nowrap ${insightTab === 'patient' ? 'bg-indigo-100 text-indigo-700' : 'text-slate-400 hover:text-slate-600'}`}>PACIENTE</button>
                                        <button onClick={() => setInsightTab('pharmacy')} className={`px-3 py-2 text-[7px] sm:text-[8px] font-black uppercase rounded-lg transition-all whitespace-nowrap ${insightTab === 'pharmacy' ? 'bg-emerald-100 text-emerald-700' : 'text-slate-400 hover:text-slate-600'}`}>FARMÁCIA</button>
                                        <button onClick={() => setInsightTab('clinic')} className={`px-3 py-2 text-[7px] sm:text-[8px] font-black uppercase rounded-lg transition-all whitespace-nowrap ${insightTab === 'clinic' ? 'bg-blue-100 text-blue-700' : 'text-slate-400 hover:text-slate-600'}`}>CLÍNICA</button>
                                        <button onClick={() => setInsightTab('doctor')} className={`px-3 py-2 text-[7px] sm:text-[8px] font-black uppercase rounded-lg transition-all whitespace-nowrap ${insightTab === 'doctor' ? 'bg-rose-100 text-rose-700' : 'text-slate-400 hover:text-slate-600'}`}>MÉDICO</button>
                                        <button onClick={() => setInsightTab('medicamento')} className={`px-3 py-2 text-[7px] sm:text-[8px] font-black uppercase rounded-lg transition-all whitespace-nowrap ${insightTab === 'medicamento' ? 'bg-purple-100 text-purple-700' : 'text-slate-400 hover:text-slate-600'}`}>REMÉDIO</button>
                                    </div>

                                    <div className="space-y-2 relative z-10">
                                        {insightData.length > 0 ? insightData.map((item, idx) => {
                                            let rankClass = 'bg-slate-100 text-slate-500 border border-slate-200';
                                            if (insightMode === 'top') { if (idx === 0) rankClass = 'bg-yellow-50 text-yellow-600 border border-yellow-200'; else if (idx === 1) rankClass = 'bg-slate-100 text-slate-500 border border-slate-200'; else if (idx === 2) rankClass = 'bg-amber-50 text-amber-600 border border-amber-200'; } else { rankClass = 'bg-teal-50 text-teal-600 border border-teal-200'; }
                                            return (<div key={idx} className="flex items-center justify-between bg-white p-3 rounded-2xl border border-slate-100 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)]"><div className="flex items-center min-w-0 flex-1 pr-2"><div className={`w-6 h-6 rounded-full flex items-center justify-center mr-3 font-black text-xs shrink-0 ${rankClass}`}>{idx + 1}</div><div className="min-w-0"><p className="font-black text-sm truncate text-slate-700 leading-tight">{item.name}</p><p className="text-[8px] text-slate-400 uppercase font-bold tracking-widest mt-0.5">{insightMode === 'top' ? (item.daysAgo === 0 ? 'Última: Hoje' : `Última: Há ${item.daysAgo} dias`) : `Registro(s): ${item.count}`}</p></div></div><div className="text-right shrink-0 flex flex-col items-end justify-center"><span className="text-lg font-black text-slate-700 leading-none">{insightMode === 'top' ? item.count : (item.daysAgo === 0 ? 'HOJE' : item.daysAgo)}</span>{!(insightMode === 'recent' && item.daysAgo === 0) && (<span className="text-[7px] text-slate-400 uppercase block mt-1">{insightMode === 'top' ? 'Vezes' : 'Dias atrás'}</span>)}</div></div>);
                                        }) : (<div className="text-center py-4 text-slate-400 text-xs font-bold">Nenhum dado registrado para esta aba.</div>)}
                                    </div>

                    {quickAdd && (<div className="fixed inset-0 z-[130] flex items-end sm:items-center justify-center p-0 sm:p-6 bg-slate-900/90 backdrop-blur-md"><div className="bg-white w-full max-w-sm rounded-t-[3rem] sm:rounded-[3rem] p-8 shadow-2xl border-t-8 border-slate-800 animate-slide-up"><h2 className="text-xl font-black text-center italic mb-6 uppercase text-slate-800">Novo(a) {quickAdd.label}</h2><div className="space-y-4 mb-8"><input type="text" placeholder={`Nome...`} autoFocus className="w-full font-bold bg-slate-50 border border-slate-100 rounded-2xl p-4 text-slate-700 outline-none focus:ring-2 focus:ring-slate-400" value={quickAddValue} onFocus={onInputFocus} onBlur={onInputBlur} onChange={e=>setQuickAddValue(e.target.value)} /></div><div className="flex space-x-3"><button onClick={()=>{setQuickAdd(null); setQuickAddValue('');}} className="flex-1 py-4 text-xs font-black text-slate-400 uppercase bg-slate-100 rounded-2xl active:scale-95 transition-all">Cancelar</button><button onClick={handleQuickAddSave} className="flex-[2] py-4 bg-slate-800 text-white text-xs font-black rounded-2xl uppercase shadow-lg shadow-slate-900/30 active:scale-95 transition-all">Adicionar</button></div></div></div>)}

                    {isKeyboardVisible && !forceShowNav && isMobileDevice() && (<div className="fixed bottom-0 left-0 right-0 h-16 z-[45]" onClick={() => setForceShowNav(true)}></div>)}

                    <nav className={`fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 flex justify-around items-center py-2 px-4 sm:px-6 pb-8 shadow-[0_-4px_20px_-4px_rgba(0,0,0,0.05)] z-40 transition-transform duration-500 ${(isKeyboardVisible && !forceShowNav) ? 'translate-y-full opacity-0 pointer-events-none' : 'translate-y-0 opacity-100'}`}>
                        <button onClick={()=>setActiveTab('dashboard')} className={`flex flex-col items-center p-2 min-w-[60px] transition-all ${activeTab === 'dashboard' ? 'text-teal-600 scale-110' : 'text-slate-400 hover:text-slate-600'}`}><IconHome /><span className="text-[8px] sm:text-[9px] mt-1 uppercase font-black">Início</span></button>
                        <button onClick={()=>setActiveTab('purchases')} className={`flex flex-col items-center p-2 min-w-[60px] transition-all ${activeTab === 'purchases' ? 'text-teal-600 scale-110' : 'text-slate-400 hover:text-slate-600'}`}><IconBag /><span className="text-[8px] sm:text-[9px] mt-1 uppercase font-black">Compras</span></button>
                        <button onClick={()=>setActiveTab('patients')} className={`flex flex-col items-center p-2 min-w-[60px] transition-all ${activeTab === 'patients' ? 'text-indigo-500 scale-110' : 'text-slate-400 hover:text-slate-600'}`}><IconUserSmall /><span className="text-[8px] sm:text-[9px] mt-1 uppercase font-black">Pacientes</span></button>
                        <button onClick={() => setIsMenuOpen(true)} className={`flex flex-col items-center p-2 min-w-[60px] transition-all text-slate-400 hover:text-slate-600`}><IconMenu /><span className="text-[8px] sm:text-[9px] mt-1 uppercase font-black">Menu</span></button>
                    </nav>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
